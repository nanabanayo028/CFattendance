<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 弹窗动画 */
        .modal-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-20 relative">

    <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-2 rounded-lg">
                <i class="fa-solid fa-chalkboard-user"></i>
            </div>
            <h1 class="font-bold text-xl tracking-tight text-slate-900">Admin <span class="text-slate-400 font-normal">| Control Panel</span></h1>
        </div>
        <div id="statusBadge" class="px-4 py-1.5 rounded-full text-sm font-bold bg-slate-100 text-slate-500 border border-slate-200 flex items-center gap-2 transition-all">
            <i class="fa-solid fa-circle text-[8px]"></i> 状态检查中...
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="col-span-1 md:col-span-2 bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex flex-col justify-center">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">考勤通道控制</h2>
                
                <div id="adminTimerContainer" class="hidden mb-4 bg-rose-50 border border-rose-100 rounded-xl p-4 flex flex-col items-center justify-center animate-[pulse_2s_ease-in-out_infinite]">
                    <span class="text-xs font-bold text-rose-400 uppercase tracking-widest mb-1">
                        <i class="fa-regular fa-clock mr-1"></i> 距离通道自动关闭还剩
                    </span>
                    <div class="text-4xl font-extrabold text-rose-600 font-mono tracking-wider" id="adminTimeDisplay">02:00</div>
                </div>

                <div class="flex items-center gap-3 mb-4 bg-slate-50 p-3 rounded-lg border border-slate-100">
                    <label for="adminPin" class="text-sm font-bold text-slate-600"><i class="fa-solid fa-key text-indigo-400 mr-1"></i> 本次签到 PIN 码:</label>
                    <input type="text" id="adminPin" placeholder="例如: 8274" maxlength="4"
                           class="bg-white border border-slate-300 text-slate-800 text-lg font-extrabold tracking-[0.2em] text-center rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-32 py-1 outline-none">
                    <button onclick="document.getElementById('adminPin').value = Math.floor(1000 + Math.random() * 9000)" 
                            class="text-xs text-indigo-500 hover:text-indigo-700 underline cursor-pointer font-medium">
                        随机生成
                    </button>
                </div>

                <div class="flex gap-4">
                    <button onclick="changeStatus('Open')" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-6 rounded-xl shadow-sm shadow-emerald-200 transition-all hover:-translate-y-0.5 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-play"></i> 开启签到
                    </button>
                    <button onclick="changeStatus('Closed')" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white font-bold py-4 px-6 rounded-xl shadow-sm shadow-rose-200 transition-all hover:-translate-y-0.5 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-stop"></i> 关闭签到
                    </button>
                </div>
            </div>

            <div class="bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl p-6 shadow-md text-white flex flex-col justify-center relative overflow-hidden">
                <i class="fa-solid fa-users absolute -right-6 -bottom-6 text-8xl opacity-20"></i>
                <h2 class="text-indigo-100 font-medium mb-1 relative z-10">当前列表人数</h2>
                <div class="text-5xl font-extrabold relative z-10">
                    <span id="studentCount">0</span>
                    <span class="text-lg font-normal text-indigo-200 ml-1">人</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
            <div class="flex items-center gap-3 bg-white p-2 rounded-xl border border-slate-200 shadow-sm w-full md:w-auto">
                <label for="dateFilter" class="text-sm font-bold text-slate-500 pl-2"><i class="fa-regular fa-calendar-days mr-1"></i> 选择日期:</label>
                <input type="date" id="dateFilter" onchange="handleDateSelection()" 
                       class="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2 outline-none cursor-pointer">
                <button onclick="clearDateFilter()" title="清除日期" class="text-slate-400 hover:text-rose-500 px-2 transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="flex gap-3 w-full md:w-auto overflow-x-auto pb-1 md:pb-0">
                <button onclick="manualCheckIn()" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold py-2.5 px-5 rounded-xl shadow-sm flex items-center gap-2 transition-all whitespace-nowrap border border-indigo-200">
                    <i class="fa-solid fa-user-plus"></i> 手动补签
                </button>
                <button id="reportBtn" onclick="openReportModal()" class="bg-amber-50 hover:bg-amber-100 text-amber-700 font-bold py-2.5 px-5 rounded-xl shadow-sm flex items-center gap-2 transition-all whitespace-nowrap border border-amber-200">
                    <i class="fa-solid fa-trophy text-amber-500"></i> 达标报表
                </button>
                <button onclick="exportToExcel()" class="bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 px-5 rounded-xl shadow-sm flex items-center gap-2 transition-all whitespace-nowrap">
                    <i class="fa-solid fa-file-excel text-emerald-400"></i> 导出当日
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                            <th class="p-4 font-semibold pl-8">Date</th>
                            <th class="p-4 font-semibold">Time</th>
                            <th class="p-4 font-semibold">Student ID</th>
                            <th class="p-4 font-semibold">Student Name</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceList" class="divide-y divide-slate-100 text-sm">
                        <tr><td colspan="4" class="p-12 text-center text-slate-400"><i class="fa-regular fa-calendar-check text-4xl mb-3 block text-slate-300"></i>请先在上方选择日期以查看签到名单</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="reportModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh] modal-fade-in">
            <div class="bg-gradient-to-r from-amber-400 to-orange-500 p-6 text-white flex justify-between items-center">
                <h3 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-award"></i> 达标学生名单 (≥4次)</h3>
                <button onclick="closeReportModal()" class="text-white/80 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1 bg-slate-50">
                <div id="reportLoading" class="text-center py-8 text-slate-400"><i class="fa-solid fa-spinner fa-spin text-3xl mb-3 block"></i> 正在跨记录统计中...</div>
                <div id="reportEmpty" class="hidden text-center py-8 text-slate-400"><i class="fa-regular fa-folder-open text-3xl mb-3 block"></i> 暂无达到 4 次出勤的学生</div>
                
                <ul id="reportList" class="hidden space-y-3">
                    </ul>
            </div>
            
            <div class="p-4 border-t border-slate-100 bg-white flex justify-end gap-3">
                <button onclick="closeReportModal()" class="px-5 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition-colors">关闭</button>
                <button id="downloadReportBtn" onclick="exportReportToExcel()" disabled class="px-5 py-2.5 rounded-xl font-bold bg-slate-800 text-white hover:bg-slate-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                    <i class="fa-solid fa-download"></i> 导出此报表
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBowy5HiYuzmuQnVoiPhM7hvDsAaMSK3a8",
            authDomain: "attendance-a7ac5.firebaseapp.com",
            projectId: "attendance-a7ac5",
            storageBucket: "attendance-a7ac5.firebasestorage.app",
            messagingSenderId: "179755027767",
            appId: "1:179755027767:web:37c6a12e95c8ea0a5b9eb2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allRecords = []; 
        let activeListeners = []; 
        let adminAutoCloseTimer = null; 
        let adminDisplayTimerInterval = null;
        let globalPassedStudents = []; // 用于存储计算好的达标学生，方便导出

        // 监听通道状态 & 老师端的同步倒计时
        db.collection("Sessions").doc("Class_01").onSnapshot((doc) => {
            const badge = document.getElementById("statusBadge");
            const timerContainer = document.getElementById("adminTimerContainer");
            const timeDisplay = document.getElementById("adminTimeDisplay");

            if (adminDisplayTimerInterval) clearInterval(adminDisplayTimerInterval);

            if (doc.exists && doc.data().status === "Open") {
                badge.innerHTML = '<i class="fa-solid fa-circle text-[10px] text-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)] rounded-full"></i> 正在允许签到 (Open)';
                badge.className = "px-4 py-1.5 rounded-full text-sm font-bold bg-emerald-50 text-emerald-700 border border-emerald-200 flex items-center gap-2 transition-all";
                
                const endTime = doc.data().endTime;
                if (endTime) {
                    timerContainer.classList.remove('hidden');
                    adminDisplayTimerInterval = setInterval(() => {
                        const now = new Date().getTime();
                        const distance = endTime - now;
                        if (distance <= 0) {
                            clearInterval(adminDisplayTimerInterval);
                            timeDisplay.innerText = "00:00";
                        } else {
                            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                            timeDisplay.innerText = (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
                        }
                    }, 1000);
                }
            } else {
                badge.innerHTML = '<i class="fa-solid fa-circle text-[10px] text-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.8)] rounded-full"></i> 签到已关闭 (Closed)';
                badge.className = "px-4 py-1.5 rounded-full text-sm font-bold bg-rose-50 text-rose-700 border border-rose-200 flex items-center gap-2 transition-all";
                if (timerContainer) timerContainer.classList.add('hidden');
            }
        });

        // 开启/关闭控制
        function changeStatus(newStatus) {
            let pinValue = "";
            let dataToUpdate = { status: newStatus };

            if (adminAutoCloseTimer) {
                clearTimeout(adminAutoCloseTimer);
                adminAutoCloseTimer = null;
            }

            if (newStatus === "Open") {
                pinValue = document.getElementById('adminPin').value.trim();
                if (pinValue === "") {
                    alert("⚠️ 请先输入 4 位数的 PIN 码，然后再开启签到！");
                    document.getElementById('adminPin').focus();
                    return;
                }
                dataToUpdate.currentPin = pinValue;
                dataToUpdate.endTime = new Date().getTime() + 2 * 60 * 1000; 

                adminAutoCloseTimer = setTimeout(() => {
                    changeStatus('Closed'); 
                }, 2 * 60 * 1000);

            } else {
                document.getElementById('adminPin').value = "";
                dataToUpdate.endTime = 0;
            }

            db.collection("Sessions").doc("Class_01").set(dataToUpdate, { merge: true })
            .catch(error => alert("操作失败: " + error.message));
        }

        // 数据抓取 (只在老师选了日期后执行)
        function loadDataForDates(dateArray) {
            activeListeners.forEach(unsub => unsub());
            activeListeners = [];
            allRecords = []; 
            renderTable(); 

            if (dateArray.length === 0) return;

            dateArray.forEach((dateString) => {
                const unsub = db.collection("Attendance")
                  .doc(dateString)
                  .collection("Students")
                  .onSnapshot((studentSnapshot) => {
                      allRecords = allRecords.filter(r => r.dateString !== dateString);
                      studentSnapshot.forEach((studentDoc) => {
                          const data = studentDoc.data();
                          if (data.timestamp) {
                              const jsDate = data.timestamp.toDate();
                              allRecords.push({
                                  studentId: data.studentId,
                                  studentName: data.studentName,
                                  fullDateObj: jsDate, 
                                  dateString: dateString, 
                                  timeString: jsDate.toLocaleTimeString('zh-CN', { hour12: false })
                              });
                          }
                      });
                      allRecords.sort((a, b) => b.fullDateObj - a.fullDateObj);
                      renderTable(); 
                  });
                activeListeners.push(unsub);
            });
        }

        // 🌟 核心更改：网页加载时不再默认抓取数据，而是空表格等待老师选择
        // (去掉了之前的 loadDataForDates 调用)

        // 日历与渲染
        function handleDateSelection() {
            const selectedDate = document.getElementById("dateFilter").value;
            if (selectedDate) {
                loadDataForDates([selectedDate]); 
            } else {
                loadDataForDates([]); // 传空数组，表格将显示“请选择日期”
            }
        }

        function clearDateFilter() {
            document.getElementById("dateFilter").value = "";
            handleDateSelection();
        }

        function renderTable() {
            const list = document.getElementById("attendanceList");
            const selectedDate = document.getElementById("dateFilter").value;
            document.getElementById("studentCount").innerText = allRecords.length;

            if (!selectedDate) {
                list.innerHTML = '<tr><td colspan="4" class="p-12 text-center text-slate-400"><i class="fa-regular fa-calendar-check text-4xl mb-3 block text-slate-300"></i>请先在上方选择日期以查看签到名单</td></tr>';
                return;
            }

            if (allRecords.length === 0) {
                list.innerHTML = '<tr><td colspan="4" class="p-12 text-center text-slate-400"><i class="fa-regular fa-folder-open text-4xl mb-3 block text-slate-300"></i>该日期暂无签到记录</td></tr>';
                return;
            }

            let htmlContent = "";
            allRecords.forEach(record => {
                htmlContent += `
                    <tr class="hover:bg-indigo-50/50 transition duration-150">
                        <td class="p-4 pl-8 text-slate-500 font-medium">${record.dateString}</td>
                        <td class="p-4 text-slate-500 font-mono"><span class="bg-slate-100 px-2 py-1 rounded text-xs">${record.timeString}</span></td>
                        <td class="p-4 font-bold text-indigo-700">${record.studentId}</td>
                        <td class="p-4 text-slate-700 font-medium">${record.studentName}</td>
                    </tr>
                `;
            });
            list.innerHTML = htmlContent;
        }

        // 🌟 新功能：手动补签
        function manualCheckIn() {
            const selectedDate = document.getElementById("dateFilter").value;
            if (!selectedDate) {
                alert("⚠️ 请先在工具栏选择你要补签的【日期】！");
                return;
            }

            const stuId = prompt(`【手动补签 - ${selectedDate}】\n请输入学生的 Student ID:`);
            if (!stuId) return; 
            
            const stuName = prompt(`请输入学号 ${stuId.toUpperCase()} 的全名 (Full Name):`);
            if (!stuName) return;

            db.collection("Attendance")
              .doc(selectedDate)
              .collection("Students")
              .doc(stuId.toUpperCase())
              .set({
                  studentId: stuId.toUpperCase(),
                  studentName: stuName.toUpperCase(),
                  timestamp: new Date() 
              })
              .then(() => alert(`✅ 成功将 ${stuName.toUpperCase()} 补签至 ${selectedDate}！`))
              .catch(error => alert("❌ 补签失败: " + error.message));
        }

        // 🌟 新功能：生成达标报表弹窗
        function openReportModal() {
            document.getElementById('reportModal').classList.remove('hidden');
            document.getElementById('reportLoading').classList.remove('hidden');
            document.getElementById('reportEmpty').classList.add('hidden');
            document.getElementById('reportList').classList.add('hidden');
            document.getElementById('downloadReportBtn').disabled = true;

            db.collectionGroup("Students").get().then((snapshot) => {
                let attendanceCount = {}; 

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const id = data.studentId;
                    if (!attendanceCount[id]) {
                        attendanceCount[id] = { id: id, name: data.studentName, count: 0 };
                    }
                    attendanceCount[id].count++;
                });

                // 筛选并排序 (这里设置的是 >= 4 次，如果你想测试，可以临时改成 1)
                globalPassedStudents = Object.values(attendanceCount)
                                             .filter(student => student.count >= 4)
                                             .sort((a, b) => b.count - a.count);

                document.getElementById('reportLoading').classList.add('hidden');

                if (globalPassedStudents.length === 0) {
                    document.getElementById('reportEmpty').classList.remove('hidden');
                } else {
                    let listHtml = "";
                    globalPassedStudents.forEach(stu => {
                        listHtml += `
                        <li class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center">
                            <div>
                                <div class="font-bold text-slate-800">${stu.name}</div>
                                <div class="text-xs text-slate-500 font-mono">${stu.id}</div>
                            </div>
                            <div class="bg-amber-100 text-amber-700 px-3 py-1 rounded-lg font-bold">
                                ${stu.count} 次
                            </div>
                        </li>`;
                    });
                    document.getElementById('reportList').innerHTML = listHtml;
                    document.getElementById('reportList').classList.remove('hidden');
                    document.getElementById('downloadReportBtn').disabled = false; // 启用下载按钮
                }
            }).catch(error => {
                alert("❌ 统计失败: " + error.message);
                closeReportModal();
            });
        }

        function closeReportModal() {
            document.getElementById('reportModal').classList.add('hidden');
        }

        // 🌟 导出特定日期的 Excel
        function exportToExcel() {
            const selectedDate = document.getElementById("dateFilter").value;
            if (!selectedDate) {
                alert("请先选择要导出的日期！"); return;
            }
            if (allRecords.length === 0) {
                alert(`日期 ${selectedDate} 没有可导出的数据！`); return;
            }

            let csvContent = "\uFEFF日期 (Date),时间 (Time),学号 (Student ID),姓名 (Name)\n"; 
            allRecords.forEach(record => {
                csvContent += `"${record.dateString}","${record.timeString}","${record.studentId}","${record.studentName}"\n`;
            });

            triggerDownload(csvContent, `Attendance_${selectedDate}.csv`);
        }

        // 🌟 导出达标报表的 Excel
        function exportReportToExcel() {
            let csvContent = "\uFEFF学号 (Student ID),姓名 (Name),总出勤次数 (Total Attendance)\n"; 
            globalPassedStudents.forEach(stu => {
                csvContent += `"${stu.id}","${stu.name}","${stu.count}"\n`;
            });
            triggerDownload(csvContent, `Attendance_Pass_Report.csv`);
        }

        // 辅助下载功能
        function triggerDownload(content, filename) {
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", filename);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
