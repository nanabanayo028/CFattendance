<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CF Admin - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">  

    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }
        .glass-login {
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }
        .pin-tracking { letter-spacing: 0.3em; text-indent: 0.15em; }
        .modal-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>

<body class="font-sans text-slate-800 pb-20 relative min-h-screen bg-cover bg-center bg-no-repeat bg-fixed" 
      style="background-image: url('Background.webp');">

    <div class="fixed inset-0 bg-black/40 z-0 pointer-events-none"></div>

    <audio id="tenseAudio" src="bgm.mp3" preload="auto"></audio>

    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-md bg-black/40 transition-all duration-500">
        <div class="glass-login p-8 sm:p-10 rounded-[2rem] w-full max-w-[380px] relative overflow-hidden shadow-2xl modal-fade-in">
            <div class="text-center mb-8">
                <img src="CF_LOGO.webp" alt="CF Logo" class="w-20 h-20 rounded-full mx-auto mb-4 object-cover border-4 border-white/80 shadow-lg">
                <h2 class="text-2xl font-extrabold tracking-tight text-white drop-shadow-md">Admin Portal</h2>
                <p class="text-sm text-indigo-100 mt-1 font-medium">Please login to continue</p>
            </div>
            
            <div class="space-y-5">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user-shield text-indigo-400"></i>
                    </div>
                    <input type="text" id="adminUserId" placeholder="Admin ID" 
                           class="w-full pl-11 pr-4 py-3.5 bg-white/90 border border-white/50 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:bg-white outline-none text-slate-800 font-bold uppercase shadow-inner transition-all">
                </div>
                
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-indigo-400"></i>
                    </div>
                    <input type="password" id="adminPassword" placeholder="Password" 
                           class="w-full pl-11 pr-4 py-3.5 bg-white/90 border border-white/50 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:bg-white outline-none text-slate-800 font-bold shadow-inner transition-all">
                </div>

                <div id="loginError" class="hidden text-rose-400 text-xs font-bold text-center bg-rose-100/90 py-2 rounded-lg border border-rose-200">
                    <i class="fa-solid fa-circle-exclamation mr-1"></i> Invalid ID or Password!
                </div>

                <button onclick="handleLogin()" id="loginBtn"
                        class="w-full mt-2 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-500/40 transform hover:-translate-y-0.5 transition-all duration-200 active:scale-95 flex justify-center items-center gap-2 border border-indigo-400/50">
                    <i class="fa-solid fa-right-to-bracket"></i> Secure Login
                </button>
            </div>
        </div>
    </div>

    <div id="adminDashboard" class="hidden opacity-0 transition-opacity duration-500">
        <nav class="sticky top-0 z-40 bg-indigo-900/80 backdrop-blur-md border-b border-white/10 px-4 sm:px-8 py-3 sm:py-4 flex justify-between items-center shadow-xl">
            <div class="flex items-center gap-3 sm:gap-4">
                <img src="CF_LOGO.webp" alt="CF Logo" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full object-cover border-2 border-white/80 shadow-sm">
                <div>
                    <h1 class="font-extrabold text-lg sm:text-xl tracking-tight text-white leading-tight">Admin <span class="text-indigo-200 font-normal hidden sm:inline">| Control Panel</span></h1>
                </div>
            </div>
            <div class="flex items-center gap-3 sm:gap-4">
                <div id="statusBadge" class="px-3 py-1 sm:px-4 sm:py-1.5 rounded-full text-xs sm:text-sm font-bold bg-white/10 text-white border border-white/20 flex items-center gap-2 transition-all">
                    <i class="fa-solid fa-circle text-[8px]"></i> 状态检查...
                </div>
                <button onclick="handleLogout()" class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-rose-500/20 text-rose-300 hover:bg-rose-500 hover:text-white transition-all flex items-center justify-center border border-rose-500/30" title="Logout">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto p-4 sm:p-8 relative z-10">
            <div class="mb-8">
                <div class="bg-gradient-to-br from-indigo-600/90 to-purple-700/90 backdrop-blur-md rounded-2xl p-6 sm:p-8 shadow-xl text-white flex flex-col sm:flex-row items-center justify-between relative overflow-hidden border border-white/20">
                    <i class="fa-solid fa-users absolute -right-4 -bottom-4 text-8xl opacity-10"></i>
                    <div class="mb-2 sm:mb-0 text-center sm:text-left">
                        <h2 class="text-indigo-100 font-medium relative z-10 uppercase tracking-wider text-sm sm:text-lg">当前列表总人数</h2>
                        <p class="text-xs text-indigo-300 mt-1">Total Attendance Count</p>
                    </div>
                    <div class="text-6xl sm:text-7xl font-extrabold relative z-10 flex items-baseline">
                        <span id="studentCount" class="font-mono">0</span>
                        <span class="text-xl font-normal text-indigo-200 ml-2">人</span>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center mb-5 gap-4">
                <div class="flex items-center gap-3 glass-card p-2 rounded-xl shadow-sm w-full md:w-auto">
                    <label for="dateFilter" class="text-sm font-bold text-slate-600 pl-2 whitespace-nowrap"><i class="fa-regular fa-calendar-days mr-1.5"></i> 选择日期:</label>
                    <input type="text" id="dateFilter" placeholder="选择查看日期..." class="bg-white/80 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block p-2 outline-none cursor-pointer flex-1">
                    <button onclick="clearDateFilter()" title="清除日期" class="text-slate-400 hover:text-rose-500 px-2 transition-colors">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>
                
                <div class="flex flex-wrap sm:flex-nowrap gap-3 w-full md:w-auto">
                    <button onclick="deleteSelectedRecords()" id="deleteSelectedBtn" class="hidden flex-1 sm:flex-initial glass-card hover:bg-rose-50 text-rose-600 font-bold py-2.5 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 transition-all whitespace-nowrap border-rose-200 active:scale-95">
                        <i class="fa-solid fa-trash-can"></i> 删除所选
                    </button>
                    <button onclick="toggleManageMode()" id="manageBtn" class="flex-1 sm:flex-initial glass-card hover:bg-white text-blue-700 font-bold py-2.5 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 transition-all whitespace-nowrap border-blue-200 active:scale-95">
                        <i class="fa-solid fa-list-check"></i> 管理名单
                    </button>

                    <button onclick="openGroupListModal()" class="flex-1 sm:flex-initial glass-card hover:bg-white text-emerald-600 font-bold py-2.5 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 transition-all whitespace-nowrap border-emerald-200 active:scale-95">
                        <i class="fa-solid fa-users-viewfinder"></i> 分组名单
                    </button>

                    <button onclick="openQRModal()" class="flex-1 sm:flex-initial bg-purple-600 hover:bg-purple-700 text-white font-bold py-2.5 px-5 rounded-xl shadow-lg shadow-purple-500/30 flex items-center justify-center gap-2 transition-all whitespace-nowrap border border-purple-500 active:scale-95">
                        <i class="fa-solid fa-qrcode"></i> 大屏扫码与控制
                    </button>
                    
                    <button onclick="openManualModal()" class="flex-1 sm:flex-initial glass-card hover:bg-white text-indigo-700 font-bold py-2.5 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 transition-all whitespace-nowrap border-indigo-200 active:scale-95">
                        <i class="fa-solid fa-user-plus text-indigo-500"></i> 手动补签
                    </button>
                    <button id="reportBtn" onclick="openReportModal()" class="flex-1 sm:flex-initial glass-card hover:bg-white text-amber-700 font-bold py-2.5 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 transition-all whitespace-nowrap border-amber-200 active:scale-95">
                        <i class="fa-solid fa-trophy text-amber-500"></i> 达标报表
                    </button>
                    <button onclick="exportToExcel()" class="w-full sm:w-auto bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 px-5 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-all whitespace-nowrap active:scale-95 border border-slate-700">
                        <i class="fa-solid fa-file-excel text-emerald-400"></i> 导出当日
                    </button>
                </div>
            </div>

            <div class="glass-card rounded-2xl shadow-xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead id="tableHeader">
                            <tr class="bg-white/50 text-slate-600 text-xs uppercase tracking-wider border-b border-white/50">
                                <th class="p-4 font-bold pl-6 sm:pl-8">Date</th>
                                <th class="p-4 font-bold">Time</th>
                                <th class="p-4 font-bold">Group</th>
                                <th class="p-4 font-bold">Student ID</th>
                                <th class="p-4 font-bold">Student Name</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceList" class="divide-y divide-white/40 text-sm">
                            <tr><td colspan="5" class="p-10 sm:p-14 text-center text-slate-500 font-medium"><i class="fa-regular fa-calendar-check text-4xl mb-3 block text-slate-400"></i>请先在上方选择日期以查看签到名单</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="groupListModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col max-h-[90vh] modal-fade-in border border-white/20">
            <div class="bg-emerald-500 p-5 sm:p-6 text-white flex justify-between items-center">
                <h3 class="text-lg sm:text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-users-viewfinder"></i> 1-8 组当日名单统计</h3>
                <button onclick="closeGroupListModal()" class="text-white/80 hover:text-white transition-colors p-1"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-4 sm:p-6 overflow-y-auto flex-1 bg-slate-50">
                <div id="groupListContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    </div>
            </div>
            <div class="p-4 border-t border-slate-100 bg-white flex justify-end gap-3">
                <button onclick="closeGroupListModal()" class="px-5 py-2.5 rounded-xl font-bold bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors active:scale-95">关闭窗口</button>
            </div>
        </div>
    </div>

    <div id="qrModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden modal-fade-in border border-white/20">
            <div class="bg-purple-600 p-5 text-white flex justify-between items-center">
                <h3 class="text-lg font-bold flex items-center gap-2"><i class="fa-solid fa-expand"></i> 签到大屏展示与控制</h3>
                <button onclick="closeQRModal()" class="text-white/80 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="p-6 bg-slate-50 flex flex-col items-center">
                <div id="adminTimerContainer" class="hidden mb-4 w-full bg-rose-50 border border-rose-100 rounded-xl p-3 flex flex-col items-center justify-center animate-[pulse_2s_ease-in-out_infinite] shadow-inner">
                    <span class="text-[10px] font-bold text-rose-400 uppercase tracking-widest mb-1"><i class="fa-regular fa-clock mr-1"></i> 距离通道自动关闭还剩</span>
                    <div class="text-4xl font-extrabold text-rose-600 font-mono tracking-wider" id="adminTimeDisplay">01:00</div>
                </div>

                <div id="qrcode-box" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 min-h-[220px] flex items-center justify-center mb-2"></div>
                <p id="qrUrlDisplay" class="text-[10px] text-slate-400 font-mono mb-2 break-all text-center"></p>
                <button onclick="generateNewQR()" class="text-xs text-purple-500 hover:text-purple-700 underline font-bold mb-5 flex items-center gap-1"><i class="fa-solid fa-rotate"></i> 刷新二维码图案</button>
                
                <div class="w-full space-y-3">
                    <div class="flex items-center gap-2">
                        <div class="bg-white border border-slate-200 rounded-xl flex items-center px-3 py-2 w-full shadow-sm">
                            <i class="fa-solid fa-key text-indigo-400 mr-2"></i>
                            <input type="text" id="adminPin" placeholder="PIN 码" maxlength="4" class="bg-transparent text-slate-800 text-lg font-extrabold pin-tracking outline-none w-full">
                        </div>
                        <button onclick="document.getElementById('adminPin').value = Math.floor(1000 + Math.random() * 9000)" class="px-4 py-3 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 font-bold rounded-xl transition-colors whitespace-nowrap"><i class="fa-solid fa-dice"></i></button>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="changeStatus('Open')" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-emerald-500/30 transition-all active:scale-95 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-play"></i> 开启签到
                        </button>
                        <button onclick="changeStatus('Closed')" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-rose-500/30 transition-all active:scale-95 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-stop"></i> 手动关闭
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="manualCheckInModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden modal-fade-in">
            <div class="bg-indigo-600 p-5 text-white flex justify-between items-center">
                <h3 class="text-lg font-bold flex items-center gap-2"><i class="fa-solid fa-user-plus"></i> 手动添加签到记录</h3>
                <button onclick="closeManualModal()" class="text-white/80 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 space-y-4 bg-slate-50">
                <div class="bg-indigo-50 text-indigo-700 px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-2 mb-2 border border-indigo-100 shadow-inner">
                    <i class="fa-regular fa-calendar-check text-lg"></i> 补签日期: <span id="modalDateDisplay" class="font-mono text-base tracking-wide"></span>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1 pl-1">Group (1-8)</label>
                    <select id="manualGroup" class="w-full bg-white border border-slate-200 text-slate-800 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block p-3.5 outline-none font-bold transition-all shadow-sm">
                        <option value="" disabled selected>-- Select Group --</option>
                        <option value="1">Group 1</option><option value="2">Group 2</option>
                        <option value="3">Group 3</option><option value="4">Group 4</option>
                        <option value="5">Group 5</option><option value="6">Group 6</option>
                        <option value="7">Group 7</option><option value="8">Group 8</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1 pl-1">Student ID</label>
                    <input type="text" id="manualStuId" class="w-full bg-white border border-slate-200 text-slate-800 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block p-3.5 outline-none uppercase font-mono transition-all shadow-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1 pl-1">Student Name</label>
                    <input type="text" id="manualStuName" class="w-full bg-white border border-slate-200 text-slate-800 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block p-3.5 outline-none uppercase font-medium transition-all shadow-sm">
                </div>
            </div>
            <div class="p-5 border-t border-slate-100 bg-white flex justify-end gap-3">
                <button onclick="closeManualModal()" class="px-5 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition-colors">取消</button>
                <button id="submitManualBtn" onclick="submitManualCheckIn()" class="px-5 py-2.5 rounded-xl font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition-all flex items-center gap-2 shadow-md shadow-indigo-200 active:scale-95">
                    <i class="fa-solid fa-check"></i> 确认添加
                </button>
            </div>
        </div>
    </div>

    <div id="reportModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[85vh] modal-fade-in">
            <div class="bg-gradient-to-r from-amber-400 to-orange-500 p-5 sm:p-6 text-white flex justify-between items-center">
                <h3 class="text-lg sm:text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-award"></i> 达标学生名单 (≥4次)</h3>
                <button onclick="closeReportModal()" class="text-white/80 hover:text-white transition-colors p-1"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-4 sm:p-6 overflow-y-auto flex-1 bg-slate-50">
                <div id="reportLoading" class="text-center py-10 text-slate-400"><i class="fa-solid fa-spinner fa-spin text-4xl mb-3 block"></i> 正在跨记录统计中...</div>
                <div id="reportEmpty" class="hidden text-center py-10 text-slate-400"><i class="fa-regular fa-folder-open text-4xl mb-3 block text-slate-300"></i> 暂无达到出勤标准的学生</div>
                <ul id="reportList" class="hidden space-y-3"></ul>
            </div>
            <div class="p-4 border-t border-slate-100 bg-white flex justify-end gap-3">
                <button onclick="closeReportModal()" class="px-5 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition-colors">关闭</button>
                <button id="downloadReportBtn" onclick="exportReportToExcel()" disabled class="px-5 py-2.5 rounded-xl font-bold bg-slate-800 text-white hover:bg-slate-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 active:scale-95">
                    <i class="fa-solid fa-download"></i> 导出报表
                </button>
            </div>
        </div>
    </div>

    <div id="customDialog" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden transform scale-95 transition-transform duration-300" id="customDialogBox">
            <div class="p-6 text-center">
                <div id="dialogIcon" class="mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-3xl"></div>
                <h3 id="dialogTitle" class="text-xl font-bold text-slate-800 mb-2"></h3>
                <p id="dialogMessage" class="text-slate-500 text-sm mb-6 whitespace-pre-line"></p>
                
                <div id="dialogInputsContainer" class="hidden flex-col gap-3 mb-6 text-left">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1 pl-1">Student ID</label>
                        <input type="text" id="dialogInputId" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none text-slate-800 font-bold shadow-inner transition-all uppercase" />
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1 pl-1">Student Name</label>
                        <input type="text" id="dialogInputName" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none text-slate-800 font-bold shadow-inner transition-all uppercase" />
                    </div>
                </div>
                
                <div class="flex gap-3 justify-center" id="dialogButtons"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        const dialogOverlay = document.getElementById('customDialog');
        const dialogBox = document.getElementById('customDialogBox');

        function openDialog(config) {
            const iconDiv = document.getElementById('dialogIcon');
            const titleDiv = document.getElementById('dialogTitle');
            const msgDiv = document.getElementById('dialogMessage');
            const btnDiv = document.getElementById('dialogButtons');
            const inputContainer = document.getElementById('dialogInputsContainer'); 
            const inputId = document.getElementById('dialogInputId');
            const inputName = document.getElementById('dialogInputName'); 

            titleDiv.innerText = config.title || '系统提示';
            msgDiv.innerText = config.message || '';

            if(config.type === 'success') {
                iconDiv.className = "mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-3xl bg-green-100 text-green-500";
                iconDiv.innerHTML = '<i class="fa-solid fa-check"></i>';
            } else if(config.type === 'warning' || config.type === 'confirm') {
                iconDiv.className = "mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-3xl bg-amber-100 text-amber-500";
                iconDiv.innerHTML = '<i class="fa-solid fa-exclamation"></i>';

        function loadDataForDates(dateArray) {
            activeListeners.forEach(unsub => unsub());

            allRecords = []; 
            renderTable();

            dateArray.forEach((dateString) => {
                const unsub = db.collection("Attendance").doc(dateString).collection("Students").orderBy("timestamp", "desc").onSnapshot((studentSnapshot) => {
                      allRecords = allRecords.filter(r => r.dateString !== dateString);
                      studentSnapshot.forEach((studentDoc) => {
                          const data = studentDoc.data();
                          if (data.timestamp) {
                              const jsDate = data.timestamp.toDate();
                              allRecords.push({
                                  studentId: data.studentId, 
                                  studentName: data.studentName, 
                                  groupNumber: data.groupNumber || '-', // 🌟 读取小组数据 (旧数据如果没有默认显示 '-')
                                  fullDateObj: jsDate, 
                                  dateString: dateString, 
                                  timeString: jsDate.toLocaleTimeString('zh-CN', { hour12: false })
                              });
                          }
                      });
                      allRecords.sort((a, b) => b.fullDateObj - a.fullDateObj);
                      renderTable(); 
                  });
                activeListeners.push(unsub);
            });
        }

        function editRecordName(oldStudentId, currentName) {
            const selectedDate = document.getElementById("dateFilter").value;
            
            customEditPrompt(`正在修改选中学生的资料\n您可以更改 Student ID 或姓名：`, oldStudentId, currentName, (newId, newName) => {
                newId = newId.trim().toUpperCase();
                newName = newName.trim().toUpperCase();

                if (!newId || !newName) {
                    customAlert("Student ID 和 Name 都不能为空！", "warning", "信息不完整");
                    return;
                }

                if (newId.includes('@')) { customAlert("Student ID 不能是 Email 格式！", "warning", "格式错误"); return; }
                if (/\d/.test(newName)) { customAlert("学生姓名不能包含数字！", "warning", "格式错误"); return; }
                if (newName.includes('@') || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newName)) { customAlert("学生姓名不能是 Email 格式！", "warning", "格式错误"); return; }

                if (newId === oldStudentId && newName === currentName) {
                    customAlert("资料没有进行任何修改。", "info", "未修改");
                    return;
                }

                const studentRef = db.collection("Attendance").doc(selectedDate).collection("Students").doc(oldStudentId);

                if (newId === oldStudentId) {
                    studentRef.update({ studentName: newName }).then(() => {
                        customAlert(`已成功将姓名修改为：${newName}`, "success", "修改成功");
                    }).catch(error => { customAlert("修改失败: " + error.message, "error", "系统异常"); });
                } else {
                    studentRef.get().then((docSnapshot) => {
                        if (docSnapshot.exists) {
                            const oldData = docSnapshot.data();
                            const newStudentRef = db.collection("Attendance").doc(selectedDate).collection("Students").doc(newId);
                            
                            const batch = db.batch();
                            // 🌟 注意：保留原本的 groupNumber
                            batch.set(newStudentRef, { studentId: newId, studentName: newName, groupNumber: oldData.groupNumber || '-', timestamp: oldData.timestamp });
                            batch.delete(studentRef);
                            
                            batch.commit().then(() => {
                                customAlert(`成功！\nID 变为: ${newId}\n姓名变为: ${newName}`, "success", "修改成功");
                            }).catch(error => { customAlert("修改 ID 失败: " + error.message, "error", "系统异常"); });
                        }
                    });
                }
            }, "✍️ 编辑学生资料");
        }

            const checkboxes = document.querySelectorAll('.row-checkbox:checked');

                return;
            }

            customConfirm(`确定要永久删除这 ${checkboxes.length} 条签到记录吗？\n删除后将无法恢复！`, () => {

                checkboxes.forEach(cb => {

                    const docRef = db.collection("Attendance").doc(selectedDate).collection("Students").doc(idToRemove);

                batch.commit().then(() => {

                }).catch(error => {

        }

        function generateNewQR() {
            const baseUrl = "https://nanabanayo028.github.io/CFattendance/index.html"; 
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
            let randomLetters = '';
            for (let i = 0; i < 6; i++) randomLetters += chars.charAt(Math.floor(Math.random() * chars.length));
            currentQRUrl = `${baseUrl}?q=${randomLetters}`;
            
            const urlDisplay = document.getElementById('qrUrlDisplay');
            if(urlDisplay) urlDisplay.innerText = currentQRUrl;
            
            const box = document.getElementById("qrcode-box"); box.innerHTML = ""; 
            qrCodeInstance = new QRCode(box, { text: currentQRUrl, width: 220, height: 220, colorDark : "#0f172a", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H });
        }

        function openManualModal() {
            const selectedDate = document.getElementById("dateFilter").value;
            if (!selectedDate) { customAlert("请先在上方日历中选择你要进行补签的【日期】！", "warning", "提示"); return; }
            currentManualDate = selectedDate;
            document.getElementById('modalDateDisplay').innerText = selectedDate;
            
            // 🌟 开启手动补签时，重置所有输入框（包括小组）
            document.getElementById('manualGroup').value = ""; 
            document.getElementById('manualStuId').value = ""; 
            document.getElementById('manualStuName').value = "";
            
            document.getElementById('manualCheckInModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('manualStuId').focus(), 100);
        }
        function closeManualModal() { document.getElementById('manualCheckInModal').classList.add('hidden'); }
        
        function submitManualCheckIn() {
            const stuGroup = document.getElementById('manualGroup').value; // 🌟 获取老师选择的组别
            const stuId = document.getElementById('manualStuId').value.trim().toUpperCase();
            const stuName = document.getElementById('manualStuName').value.trim().toUpperCase();
            
            if (!stuId || !stuName || !stuGroup) { customAlert("Group, Student ID 和 Name 都不能为空！", "warning", "信息不完整"); return; }
            
            if (stuId.includes('@')) { customAlert("Student ID 不能是 Email 格式！", "warning", "格式错误"); return; }
            if (/\d/.test(stuName)) { customAlert("Student Name 不能包含数字！", "warning", "格式错误"); return; }
            if (stuName.includes('@') || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(stuName)) { customAlert("Student Name 不能是 Email 格式！", "warning", "格式错误"); return; }
            
            const btn = document.getElementById('submitManualBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 提交中...'; btn.disabled = true;
            
            // 🌟 保存时加入 groupNumber
            db.collection("Attendance").doc(currentManualDate).collection("Students").doc(stuId).set({ 
                studentId: stuId, 
                studentName: stuName, 
                groupNumber: stuGroup,
                timestamp: new Date() 
            })
            .then(() => { customAlert(`成功补签！\n学生 ${stuName} 已加入 ${currentManualDate} 的名单 (Group ${stuGroup})。`, "success", "补签成功"); closeManualModal(); btn.innerHTML = '<i class="fa-solid fa-check"></i> 确认添加'; btn.disabled = false; })
            .catch(error => { customAlert("补签失败: " + error.message, "error", "操作异常"); btn.innerHTML = '<i class="fa-solid fa-check"></i> 确认添加'; btn.disabled = false; });
        }

        function openReportModal() {
            document.getElementById('reportModal').classList.remove('hidden');
            document.getElementById('reportLoading').classList.remove('hidden');
            document.getElementById('reportEmpty').classList.add('hidden');
            document.getElementById('reportList').classList.add('hidden');
            document.getElementById('downloadReportBtn').disabled = true;

            db.collectionGroup("Students").get().then((snapshot) => {
                let attendanceCount = {}; 
                snapshot.forEach((doc) => {
                    const data = doc.data(); const id = data.studentId;
                    if (!attendanceCount[id]) { attendanceCount[id] = { id: id, name: data.studentName, count: 0 }; }
                    attendanceCount[id].count++;
                });
                globalPassedStudents = Object.values(attendanceCount).filter(student => student.count >= 4).sort((a, b) => b.count - a.count);
                document.getElementById('reportLoading').classList.add('hidden');
                if (globalPassedStudents.length === 0) {
                    document.getElementById('reportEmpty').classList.remove('hidden');
                } else {
                    let listHtml = "";
                    globalPassedStudents.forEach(stu => {
                        listHtml += `<li class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center"><div><div class="font-bold text-slate-800 text-base sm:text-lg">${stu.name}</div><div class="text-xs sm:text-sm text-slate-500 font-mono">${stu.id}</div></div><div class="bg-amber-100 text-amber-700 px-3 py-1 sm:px-4 sm:py-1.5 rounded-lg font-bold text-sm sm:text-base">${stu.count} 次</div></li>`;
                    });
                    document.getElementById('reportList').innerHTML = listHtml; document.getElementById('reportList').classList.remove('hidden'); document.getElementById('downloadReportBtn').disabled = false; 
                }
            }).catch(error => { customAlert("统计失败: " + error.message, "error", "系统异常"); closeReportModal(); });
        }
        function closeReportModal() { document.getElementById('reportModal').classList.add('hidden'); }

        function exportToExcel() {
            const selectedDate = document.getElementById("dateFilter").value;
            if (!selectedDate) { customAlert("请先在上方日历中选择要导出的日期！", "warning", "操作提示"); return; }
            if (allRecords.length === 0) { customAlert(`日期 ${selectedDate} 没有可导出的签到数据！`, "warning", "空数据"); return; }
            
            // 🌟 导出时新增 Group 栏位
            let csvContent = "\uFEFF日期 (Date),时间 (Time),组别 (Group),学号 (Student ID),姓名 (Name)\n"; 
            allRecords.forEach(record => { csvContent += `"${record.dateString}","${record.timeString}","${record.groupNumber}","${record.studentId}","${record.studentName}"\n`; });
            triggerDownload(csvContent, `Attendance_${selectedDate}.csv`);
        }

        function exportReportToExcel() {
            let csvContent = "\uFEFF学号 (Student ID),姓名 (Name),总出勤次数 (Total Attendance)\n"; 
            globalPassedStudents.forEach(stu => { csvContent += `"${stu.id}","${stu.name}","${stu.count}"\n`; });
            triggerDownload(csvContent, `Attendance_Pass_Report.csv`);
        }

        function triggerDownload(content, filename) {
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = filename;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
    </script>
</body>
</html>
