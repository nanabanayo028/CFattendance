<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CF Admin - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">  

    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }
        .glass-login {
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }
        .pin-tracking { letter-spacing: 0.3em; text-indent: 0.15em; }
        .modal-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>

<body class="font-sans text-slate-800 pb-20 relative min-h-screen bg-cover bg-center bg-no-repeat bg-fixed" 
      style="background-image: url('Background.webp');">

    <div class="fixed inset-0 bg-black/40 z-0 pointer-events-none"></div>

    <audio id="tenseAudio" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-md bg-black/40 transition-all duration-500">
        <div class="glass-login p-8 sm:p-10 rounded-[2rem] w-full max-w-[380px] relative overflow-hidden shadow-2xl modal-fade-in">
            <div class="text-center mb-8">
                <img src="CF_LOGO.webp" alt="CF Logo" class="w-20 h-20 rounded-full mx-auto mb-4 object-cover border-4 border-white/80 shadow-lg">
                <h2 class="text-2xl font-extrabold tracking-tight text-white drop-shadow-md">Admin Portal</h2>
                <p class="text-sm text-indigo-100 mt-1 font-medium">Please login to continue</p>
            </div>
            
            <div class="space-y-5">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user-shield text-indigo-400"></i>
                    </div>
                    <input type="text" id="adminUserId" placeholder="Admin ID" 
                           class="w-full pl-11 pr-4 py-3.5 bg-white/90 border border-white/50 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:bg-white outline-none text-slate-800 font-bold shadow-inner transition-all">
                </div>
                
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-indigo-400"></i>
                    </div>
                    <input type="password" id="adminPassword" placeholder="Password" 
                           class="w-full pl-11 pr-4 py-3.5 bg-white/90 border border-white/50 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:bg-white outline-none text-slate-800 font-bold shadow-inner transition-all">
                </div>

                <div id="loginError" class="hidden text-rose-400 text-xs font-bold text-center bg-rose-100/90 py-2 rounded-lg border border-rose-200">
                    <i class="fa-solid fa-circle-exclamation mr-1"></i> Invalid ID or Password!
                </div>

                <button onclick="handleLogin()" id="loginBtn"
                        class="w-full mt-2 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-500/40 transform hover:-translate-y-0.5 transition-all duration-200 active:scale-95 flex justify-center items-center gap-2 border border-indigo-400/50">
                    <i class="fa-solid fa-right-to-bracket"></i> Secure Login
                </button>
            </div>
        </div>
    </div>

    <div id="adminDashboard" class="hidden opacity-0 transition-opacity duration-500">
        <nav class="sticky top-0 z-40 bg-indigo-900/80 backdrop-blur-md border-b border-white/10 px-4 sm:px-8 py-3 sm:py-4 flex justify-between items-center shadow-xl">
            <div class="flex items-center gap-3 sm:gap-4">
                <img src="CF_LOGO.webp" alt="CF Logo" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full object-cover border-2 border-white/80 shadow-sm">
                <div>
                    <h1 class="font-extrabold text-lg sm:text-xl tracking-tight text-white leading-tight">Admin <span class="text-indigo-200 font-normal hidden sm:inline">| Control Panel</span></h1>
                </div>
            </div>
            <div class="flex items-center gap-3 sm:gap-4">
                <div id="statusBadge" class="px-3 py-1 sm:px-4 sm:py-1.5 rounded-full text-xs sm:text-sm font-bold bg-white/10 text-white border border-white/20 flex items-center gap-2 transition-all">
                    <i class="fa-solid fa-circle text-[8px]"></i> 状态检查...
                </div>
                <button onclick="handleLogout()" class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-rose-500/20 text-rose-300 hover:bg-rose-500 hover:text-white transition-all flex items-center justify-center border border-rose-500/30" title="Logout">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto p-4 sm:p-8 relative z-10">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="col-span-1 md:col-span-2 glass-card rounded-2xl p-5 sm:p-6 shadow-sm flex flex-col justify-center">
                    <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">考勤通道控制</h2>
                    
                    <div id="adminTimerContainer" class="hidden mb-4 bg-rose-50/80 border border-rose-100 rounded-xl p-4 flex flex-col items-center justify-center animate-[pulse_2s_ease-in-out_infinite] shadow-inner">
                        <span class="text-xs font-bold text-rose-400 uppercase tracking-widest mb-1">
                            <i class="fa-regular fa-clock mr-1"></i> 距离通道自动关闭还剩
                        </span>
                        <div class="text-4xl font-extrabold text-rose-600 font-mono tracking-wider" id="adminTimeDisplay">01:00</div>
                    </div>

                    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3 mb-5 bg-white/70 backdrop-blur-sm p-3.5 rounded-xl border border-white shadow-inner">
                        <label for="adminPin" class="text-sm font-bold text-slate-700 whitespace-nowrap"><i class="fa-solid fa-key text-indigo-500 mr-1.5"></i> 本次签到 PIN 码:</label>
                        <div class="flex items-center gap-3 w-full sm:w-auto">
                            <input type="text" id="adminPin" placeholder="8274" maxlength="4"
                                   class="bg-white border border-slate-200 text-slate-800 text-lg font-extrabold pin-tracking text-center rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:w-32 py-2.5 outline-none shadow-sm transition-all">
                            <button onclick="document.getElementById('adminPin').value = Math.floor(1000 + Math.random() * 9000)" 
                                    class="text-xs text-indigo-600 hover:text-indigo-800 underline cursor-pointer font-bold whitespace-nowrap">
                                随机生成
                            </button>
                        </div>
                    </div>

                    <div class="flex gap-3 sm:gap-4">
                        <button onclick="changeStatus('Open')" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 sm:py-4 px-4 rounded-xl shadow-lg shadow-emerald-500/30 transition-all hover:-translate-y-0.5 active:scale-95 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-play"></i> 开启签到
                        </button>
                        <button onclick="changeStatus('Closed')" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white font-bold py-3.5 sm:py-4 px-4 rounded-xl shadow-lg shadow-rose-500/30 transition-all hover:-translate-y-0.5 active:scale-95 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-stop"></i> 关闭签到
                        </button>
                    </div>
                </div>

                <div class="bg-gradient-to-br from-indigo-600/90 to-purple-700/90 backdrop-blur-md rounded-2xl p-6 shadow-xl text-white flex flex-col justify-center relative overflow-hidden border border-white/20">
                    <i class="fa-solid fa-users absolute -right-6 -bottom-6 text-8xl opacity-10"></i>
                    <h2 class="text-indigo-100 font-medium mb-1 relative z-10 uppercase tracking-wider text-sm">当前列表人数</h2>
                    <div class="text-6xl font-extrabold relative z-10 flex items-baseline mt-2">
                        <span id="studentCount" class="font-mono">0</span>
                        <span class="text-xl font-normal text-indigo-200 ml-2">人</span>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center mb-5 gap-4">
                <div class="flex items-center gap-3 glass-card p-2 rounded-xl shadow-sm w-full md:w-auto">
                    <label for="dateFilter" class="text-sm font-bold text-slate-600 pl-2 whitespace-nowrap"><i class="fa-regular fa-calendar-days mr-1.5"></i> 选择日期:</label>
                    <input type="text" id="dateFilter" placeholder="选择查看日期..." 
                           class="bg-white/80 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block p-2 outline-none cursor-pointer flex-1">
                    <button onclick="clearDateFilter()" title="清除日期" class="text-slate-400 hover:text-rose-500 px-2 transition-colors">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>
                
                <div class="flex flex-wrap sm:flex-nowrap gap-3 w-full md:w-auto">
                    <button onclick="deleteSelectedRecords()" id="deleteSelectedBtn" class="hidden flex-1 sm:flex-initial glass-card hover:bg-rose-50 text-rose-600 font-bold py-2.5 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 transition-all whitespace-nowrap border-rose-200 active:scale-95">
                        <i class="fa-solid fa-trash-can"></i> 删除所选
                    </button>
                    <button onclick="toggleManageMode()" id="manageBtn" class="flex-1 sm:flex-initial glass-card hover:bg-white text-blue-700 font-bold py-2.5 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 transition-all whitespace-nowrap border-blue-200 active:scale-95">
                        <i class="fa-solid fa-list-check"></i> 管理名单
                    </button>

                    <button onclick="openQRModal()" class="flex-1 sm:flex-initial glass-card hover:bg-white text-purple-700 font-bold py-2.5 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 transition-all whitespace-nowrap border-purple-200 active:scale-95">
                        <i class="fa-solid fa-qrcode text-purple-500"></i> 二维码
                    </button>
                    <button onclick="openManualModal()" class="flex-1 sm:flex-initial glass-card hover:bg-white text-indigo-700 font-bold py-2.5 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 transition-all whitespace-nowrap border-indigo-200 active:scale-95">
                        <i class="fa-solid fa-user-plus text-indigo-500"></i> 手动补签
                    </button>
                    <button id="reportBtn" onclick="openReportModal()" class="flex-1 sm:flex-initial glass-card hover:bg-white text-amber-700 font-bold py-2.5 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 transition-all whitespace-nowrap border-amber-200 active:scale-95">
                        <i class="fa-solid fa-trophy text-amber-500"></i> 达标报表
                    </button>
                    <button onclick="exportToExcel()" class="w-full sm:w-auto bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 px-5 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-all whitespace-nowrap active:scale-95 border border-slate-700">
                        <i class="fa-solid fa-file-excel text-emerald-400"></i> 导出当日
                    </button>
                </div>
            </div>

            <div class="glass-card rounded-2xl shadow-xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead id="tableHeader">
                            <tr class="bg-white/50 text-slate-600 text-xs uppercase tracking-wider border-b border-white/50">
                                <th class="p-4 font-bold pl-6 sm:pl-8">Date</th>
                                <th class="p-4 font-bold">Time</th>
                                <th class="p-4 font-bold">Student ID</th>
                                <th class="p-4 font-bold">Student Name</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceList" class="divide-y divide-white/40 text-sm">
                            <tr><td colspan="4" class="p-10 sm:p-14 text-center text-slate-500 font-medium"><i class="fa-regular fa-calendar-check text-4xl mb-3 block text-slate-400"></i>请先在上方选择日期以查看签到名单</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="qrModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden modal-fade-in">
            <div class="bg-purple-600 p-5 text-white flex justify-between items-center">
                <h3 class="text-lg font-bold flex items-center gap-2"><i class="fa-solid fa-qrcode"></i> 签到专属二维码</h3>
                <button onclick="closeQRModal()" class="text-white/80 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 flex flex-col items-center bg-slate-50">
                <p class="text-sm text-slate-500 text-center mb-4">每次点击都会生成带有 6 位随机字母的全新二维码。</p>
                <div id="qrcode-box" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 min-h-[200px] flex items-center justify-center"></div>
                <p id="qrUrlDisplay" class="text-xs text-slate-500 font-mono mt-3 break-all text-center bg-slate-200/50 px-3 py-1.5 rounded-lg border border-slate-200"></p>
            </div>
            <div class="p-5 border-t border-slate-100 bg-white flex justify-center gap-3">
                <button onclick="generateNewQR()" class="w-full py-3 rounded-xl font-bold bg-purple-600 text-white hover:bg-purple-700 transition-all flex items-center justify-center gap-2 shadow-md shadow-purple-200 active:scale-95">
                    <i class="fa-solid fa-rotate"></i> 生成新二维码
                </button>
            </div>
        </div>
    </div>

    <div id="manualCheckInModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden modal-fade-in">
            <div class="bg-indigo-600 p-5 text-white flex justify-between items-center">
                <h3 class="text-lg font-bold flex items-center gap-2"><i class="fa-solid fa-user-plus"></i> 手动添加签到记录</h3>
                <button onclick="closeManualModal()" class="text-white/80 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 space-y-4 bg-slate-50">
                <div class="bg-indigo-50 text-indigo-700 px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-2 mb-2 border border-indigo-100 shadow-inner">
                    <i class="fa-regular fa-calendar-check text-lg"></i> 补签日期: <span id="modalDateDisplay" class="font-mono text-base tracking-wide"></span>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 pl-1">Student ID</label>
                    <input type="text" id="manualStuId" placeholder=" " 
                           class="w-full bg-white border border-slate-200 text-slate-800 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block p-3.5 outline-none uppercase font-mono transition-all shadow-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 pl-1">Student Name</label>
                    <input type="text" id="manualStuName" placeholder=" " 
                           class="w-full bg-white border border-slate-200 text-slate-800 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block p-3.5 outline-none uppercase font-medium transition-all shadow-sm">
                </div>
            </div>
            <div class="p-5 border-t border-slate-100 bg-white flex justify-end gap-3">
                <button onclick="closeManualModal()" class="px-5 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition-colors">取消</button>
                <button id="submitManualBtn" onclick="submitManualCheckIn()" class="px-5 py-2.5 rounded-xl font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition-all flex items-center gap-2 shadow-md shadow-indigo-200 active:scale-95">
                    <i class="fa-solid fa-check"></i> 确认添加
                </button>
            </div>
        </div>
    </div>

    <div id="reportModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[85vh] modal-fade-in">
            <div class="bg-gradient-to-r from-amber-400 to-orange-500 p-5 sm:p-6 text-white flex justify-between items-center">
                <h3 class="text-lg sm:text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-award"></i> 达标学生名单 (≥4次)</h3>
                <button onclick="closeReportModal()" class="text-white/80 hover:text-white transition-colors p-1"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-4 sm:p-6 overflow-y-auto flex-1 bg-slate-50">
                <div id="reportLoading" class="text-center py-10 text-slate-400"><i class="fa-solid fa-spinner fa-spin text-4xl mb-3 block"></i> 正在跨记录统计中...</div>
                <div id="reportEmpty" class="hidden text-center py-10 text-slate-400"><i class="fa-regular fa-folder-open text-4xl mb-3 block text-slate-300"></i> 暂无达到出勤标准的学生</div>
                <ul id="reportList" class="hidden space-y-3"></ul>
            </div>
            <div class="p-4 border-t border-slate-100 bg-white flex justify-end gap-3">
                <button onclick="closeReportModal()" class="px-5 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition-colors">关闭</button>
                <button id="downloadReportBtn" onclick="exportReportToExcel()" disabled class="px-5 py-2.5 rounded-xl font-bold bg-slate-800 text-white hover:bg-slate-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 active:scale-95">
                    <i class="fa-solid fa-download"></i> 导出报表
                </button>
            </div>
        </div>
    </div>

    <div id="customDialog" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden transform scale-95 transition-transform duration-300" id="customDialogBox">
            <div class="p-6 text-center">
                <div id="dialogIcon" class="mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-3xl"></div>
                <h3 id="dialogTitle" class="text-xl font-bold text-slate-800 mb-2"></h3>
                <p id="dialogMessage" class="text-slate-500 text-sm mb-6 whitespace-pre-line"></p>
                <div class="flex gap-3 justify-center" id="dialogButtons"></div>
            </div>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"> </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script src="admin.js"></script>
</body>
</html>
