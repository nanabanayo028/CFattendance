<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CF Admin - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 🌟 高级毛玻璃特效，保证后台文字清晰 */
        .glass-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }
        /* PIN 码输入框专属样式 */
        .pin-tracking {
            letter-spacing: 0.3em;
            text-indent: 0.15em;
        }
        /* 弹窗动画 */
        .modal-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>

<body class="font-sans text-slate-800 pb-20 relative min-h-screen bg-cover bg-center bg-no-repeat bg-fixed" 
      style="background-image: url('Background.jpg');">

    <div class="fixed inset-0 bg-black/40 z-0 pointer-events-none"></div>

    <nav class="sticky top-0 z-50 bg-indigo-900/80 backdrop-blur-md border-b border-white/10 px-4 sm:px-8 py-3 sm:py-4 flex justify-between items-center shadow-xl">
        <div class="flex items-center gap-3 sm:gap-4">
            <img src="CF_LOGO.png" alt="CF Logo" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full object-cover border-2 border-white/80 shadow-sm">
            <div>
                <h1 class="font-extrabold text-lg sm:text-xl tracking-tight text-white leading-tight">Admin <span class="text-indigo-200 font-normal hidden sm:inline">| Control Panel</span></h1>
            </div>
        </div>
        <div id="statusBadge" class="px-3 py-1 sm:px-4 sm:py-1.5 rounded-full text-xs sm:text-sm font-bold bg-white/10 text-white border border-white/20 flex items-center gap-2 transition-all">
            <i class="fa-solid fa-circle text-[8px]"></i> 状态检查中...
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4 sm:p-8 relative z-10">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="col-span-1 md:col-span-2 glass-card rounded-2xl p-5 sm:p-6 shadow-sm flex flex-col justify-center">
                <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">考勤通道控制</h2>
                
                <div id="adminTimerContainer" class="hidden mb-4 bg-rose-50/80 border border-rose-100 rounded-xl p-4 flex flex-col items-center justify-center animate-[pulse_2s_ease-in-out_infinite] shadow-inner">
                    <span class="text-xs font-bold text-rose-400 uppercase tracking-widest mb-1">
                        <i class="fa-regular fa-clock mr-1"></i> 距离通道自动关闭还剩
                    </span>
                    <div class="text-4xl font-extrabold text-rose-600 font-mono tracking-wider" id="adminTimeDisplay">02:00</div>
                </div>

                <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3 mb-5 bg-white/70 backdrop-blur-sm p-3.5 rounded-xl border border-white shadow-inner">
                    <label for="adminPin" class="text-sm font-bold text-slate-700 whitespace-nowrap"><i class="fa-solid fa-key text-indigo-500 mr-1.5"></i> 本次签到 PIN 码:</label>
                    <div class="flex items-center gap-3 w-full sm:w-auto">
                        <input type="text" id="adminPin" placeholder="8274" maxlength="4"
                               class="bg-white border border-slate-200 text-slate-800 text-lg font-extrabold pin-tracking text-center rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:w-32 py-2.5 outline-none shadow-sm transition-all">
                        <button onclick="document.getElementById('adminPin').value = Math.floor(1000 + Math.random() * 9000)" 
                                class="text-xs text-indigo-600 hover:text-indigo-800 underline cursor-pointer font-bold whitespace-nowrap">
                            随机生成
                        </button>
                    </div>
                </div>

                <div class="flex gap-3 sm:gap-4">
                    <button onclick="changeStatus('Open')" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 sm:py-4 px-4 rounded-xl shadow-lg shadow-emerald-500/30 transition-all hover:-translate-y-0.5 active:scale-95 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-play"></i> 开启签到
                    </button>
                    <button onclick="changeStatus('Closed')" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white font-bold py-3.5 sm:py-4 px-4 rounded-xl shadow-lg shadow-rose-500/30 transition-all hover:-translate-y-0.5 active:scale-95 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-stop"></i> 关闭签到
                    </button>
                </div>
            </div>

            <div class="bg-gradient-to-br from-indigo-600/90 to-purple-700/90 backdrop-blur-md rounded-2xl p-6 shadow-xl text-white flex flex-col justify-center relative overflow-hidden border border-white/20">
                <i class="fa-solid fa-users absolute -right-6 -bottom-6 text-8xl opacity-10"></i>
                <h2 class="text-indigo-100 font-medium mb-1 relative z-10 uppercase tracking-wider text-sm">当前列表人数</h2>
                <div class="text-6xl font-extrabold relative z-10 flex items-baseline mt-2">
                    <span id="studentCount" class="font-mono">0</span>
                    <span class="text-xl font-normal text-indigo-200 ml-2">人</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mb-5 gap-4">
            <div class="flex items-center gap-3 glass-card p-2 rounded-xl shadow-sm w-full md:w-auto">
                <label for="dateFilter" class="text-sm font-bold text-slate-600 pl-2 whitespace-nowrap"><i class="fa-regular fa-calendar-days mr-1.5"></i> 选择日期:</label>
                <input type="date" id="dateFilter" onchange="handleDateSelection()" 
                       class="bg-white/80 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block p-2 outline-none cursor-pointer flex-1">
                <button onclick="clearDateFilter()" title="清除日期" class="text-slate-400 hover:text-rose-500 px-2 transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
            <div class="flex flex-wrap sm:flex-nowrap gap-3 w-full md:w-auto">
                <button onclick="openManualModal()" class="flex-1 sm:flex-initial glass-card hover:bg-white text-indigo-700 font-bold py-2.5 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 transition-all whitespace-nowrap border-indigo-200 active:scale-95">
                    <i class="fa-solid fa-user-plus text-indigo-500"></i> 手动补签
                </button>
                <button id="reportBtn" onclick="openReportModal()" class="flex-1 sm:flex-initial glass-card hover:bg-white text-amber-700 font-bold py-2.5 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 transition-all whitespace-nowrap border-amber-200 active:scale-95">
                    <i class="fa-solid fa-trophy text-amber-500"></i> 达标报表
                </button>
                <button onclick="exportToExcel()" class="w-full sm:w-auto bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 px-5 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-all whitespace-nowrap active:scale-95 border border-slate-700">
                    <i class="fa-solid fa-file-excel text-emerald-400"></i> 导出当日
                </button>
            </div>
        </div>

        <div class="glass-card rounded-2xl shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/50 text-slate-600 text-xs uppercase tracking-wider border-b border-white/50">
                            <th class="p-4 font-bold pl-6 sm:pl-8">Date</th>
                            <th class="p-4 font-bold">Time</th>
                            <th class="p-4 font-bold">Student ID</th>
                            <th class="p-4 font-bold">Student Name</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceList" class="divide-y divide-white/40 text-sm">
                        <tr><td colspan="4" class="p-10 sm:p-14 text-center text-slate-500 font-medium"><i class="fa-regular fa-calendar-check text-4xl mb-3 block text-slate-400"></i>请先在上方选择日期以查看签到名单</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="manualCheckInModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden modal-fade-in">
            <div class="bg-indigo-600 p-5 text-white flex justify-between items-center">
                <h3 class="text-lg font-bold flex items-center gap-2"><i class="fa-solid fa-user-plus"></i> 手动添加签到记录</h3>
                <button onclick="closeManualModal()" class="text-white/80 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="p-6 space-y-4 bg-slate-50">
                <div class="bg-indigo-50 text-indigo-700 px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-2 mb-2 border border-indigo-100 shadow-inner">
                    <i class="fa-regular fa-calendar-check text-lg"></i> 补签日期: <span id="modalDateDisplay" class="font-mono text-base tracking-wide"></span>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 pl-1">Student ID</label>
                    <input type="text" id="manualStuId" placeholder="e.g. BCS23090066" 
                           class="w-full bg-white border border-slate-200 text-slate-800 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block p-3.5 outline-none uppercase font-mono transition-all shadow-sm">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 pl-1">Student Name</label>
                    <input type="text" id="manualStuName" placeholder="e.g. ALI BIN ABU" 
                           class="w-full bg-white border border-slate-200 text-slate-800 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 block p-3.5 outline-none uppercase font-medium transition-all shadow-sm">
                </div>
            </div>
            
            <div class="p-5 border-t border-slate-100 bg-white flex justify-end gap-3">
                <button onclick="closeManualModal()" class="px-5 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition-colors">取消 (Cancel)</button>
                <button id="submitManualBtn" onclick="submitManualCheckIn()" class="px-5 py-2.5 rounded-xl font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition-all flex items-center gap-2 shadow-md shadow-indigo-200 active:scale-95">
                    <i class="fa-solid fa-check"></i> 确认添加
                </button>
            </div>
        </div>
    </div>

    <div id="reportModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[85vh] modal-fade-in">
            <div class="bg-gradient-to-r from-amber-400 to-orange-500 p-5 sm:p-6 text-white flex justify-between items-center">
                <h3 class="text-lg sm:text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-award"></i> 达标学生名单 (≥4次)</h3>
                <button onclick="closeReportModal()" class="text-white/80 hover:text-white transition-colors p-1"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-4 sm:p-6 overflow-y-auto flex-1 bg-slate-50">
                <div id="reportLoading" class="text-center py-10 text-slate-400"><i class="fa-solid fa-spinner fa-spin text-4xl mb-3 block"></i> 正在跨记录统计中...</div>
                <div id="reportEmpty" class="hidden text-center py-10 text-slate-400"><i class="fa-regular fa-folder-open text-4xl mb-3 block text-slate-300"></i> 暂无达到出勤标准的学生</div>
                <ul id="reportList" class="hidden space-y-3"></ul>
            </div>
            <div class="p-4 border-t border-slate-100 bg-white flex justify-end gap-3">
                <button onclick="closeReportModal()" class="px-5 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition-colors">关闭</button>
                <button id="downloadReportBtn" onclick="exportReportToExcel()" disabled class="px-5 py-2.5 rounded-xl font-bold bg-slate-800 text-white hover:bg-slate-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 active:scale-95">
                    <i class="fa-solid fa-download"></i> 导出报表
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBowy5HiYuzmuQnVoiPhM7hvDsAaMSK3a8",
            authDomain: "attendance-a7ac5.firebaseapp.com",
            projectId: "attendance-a7ac5",
            storageBucket: "attendance-a7ac5.firebasestorage.app",
            messagingSenderId: "179755027767",
            appId: "1:179755027767:web:37c6a12e95c8ea0a5b9eb2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allRecords = []; 
        let activeListeners = []; 
        let adminAutoCloseTimer = null; 
        let adminDisplayTimerInterval = null;
        let globalPassedStudents = []; 
        let currentManualDate = ""; 

        // 监听通道状态 & 老师端的同步倒计时
        db.collection("Sessions").doc("Class_01").onSnapshot((doc) => {
            const badge = document.getElementById("statusBadge");
            const timerContainer = document.getElementById("adminTimerContainer");
            const timeDisplay = document.getElementById("adminTimeDisplay");

            if (adminDisplayTimerInterval) clearInterval(adminDisplayTimerInterval);

            if (doc.exists && doc.data().status === "Open") {
                badge.innerHTML = '<i class="fa-solid fa-circle text-[10px] text-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)] rounded-full"></i> <span class="hidden sm:inline">正在允许签到 (Open)</span><span class="sm:hidden">Open</span>';
                badge.className = "px-3 py-1 sm:px-4 sm:py-1.5 rounded-full text-xs sm:text-sm font-bold bg-white/10 text-white border border-white/20 flex items-center gap-2 transition-all";
                
                const endTime = doc.data().endTime;
                if (endTime) {
                    timerContainer.classList.remove('hidden');
                    adminDisplayTimerInterval = setInterval(() => {
                        const now = new Date().getTime();
                        const distance = endTime - now;
                        if (distance <= 0) {
                            clearInterval(adminDisplayTimerInterval);
                            timeDisplay.innerText = "00:00";
                        } else {
                            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                            timeDisplay.innerText = (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
                        }
                    }, 1000);
                }
            } else {
                badge.innerHTML = '<i class="fa-solid fa-circle text-[10px] text-rose-400 shadow-[0_0_8px_rgba(251,113,133,0.8)] rounded-full"></i> <span class="hidden sm:inline">签到已关闭 (Closed)</span><span class="sm:hidden">Closed</span>';
                badge.className = "px-3 py-1 sm:px-4 sm:py-1.5 rounded-full text-xs sm:text-sm font-bold bg-white/10 text-white border border-white/20 flex items-center gap-2 transition-all";
                if (timerContainer) timerContainer.classList.add('hidden');
            }
        });

        function changeStatus(newStatus) {
            let pinValue = "";
            let dataToUpdate = { status: newStatus };

            if (adminAutoCloseTimer) {
                clearTimeout(adminAutoCloseTimer);
                adminAutoCloseTimer = null;
            }

            if (newStatus === "Open") {
                pinValue = document.getElementById('adminPin').value.trim();
                if (pinValue === "") {
                    alert("⚠️ 请先输入 4 位数的 PIN 码，然后再开启签到！");
                    document.getElementById('adminPin').focus();
                    return;
                }
                dataToUpdate.currentPin = pinValue;
                dataToUpdate.endTime = new Date().getTime() + 2 * 60 * 1000; 

                adminAutoCloseTimer = setTimeout(() => {
                    changeStatus('Closed'); 
                }, 2 * 60 * 1000);
            } else {
                document.getElementById('adminPin').value = "";
                dataToUpdate.endTime = 0;
            }

            db.collection("Sessions").doc("Class_01").set(dataToUpdate, { merge: true })
            .catch(error => alert("操作失败: " + error.message));
        }

        function loadDataForDates(dateArray) {
            activeListeners.forEach(unsub => unsub());
            activeListeners = [];
            allRecords = []; 
            renderTable(); 

            if (dateArray.length === 0) return;

            dateArray.forEach((dateString) => {
                const unsub = db.collection("Attendance")
                  .doc(dateString)
                  .collection("Students")
                  .orderBy("timestamp", "desc")
                  .onSnapshot((studentSnapshot) => {
                      allRecords = allRecords.filter(r => r.dateString !== dateString);
                      studentSnapshot.forEach((studentDoc) => {
                          const data = studentDoc.data();
                          if (data.timestamp) {
                              const jsDate = data.timestamp.toDate();
                              allRecords.push({
                                  studentId: data.studentId,
                                  studentName: data.studentName,
                                  fullDateObj: jsDate, 
                                  dateString: dateString, 
                                  timeString: jsDate.toLocaleTimeString('zh-CN', { hour12: false })
                              });
                          }
                      });
                      allRecords.sort((a, b) => b.fullDateObj - a.fullDateObj);
                      renderTable(); 
                  });
                activeListeners.push(unsub);
            });
        }

        function handleDateSelection() {
            const selectedDate = document.getElementById("dateFilter").value;
            if (selectedDate) {
                loadDataForDates([selectedDate]); 
            } else {
                loadDataForDates([]); 
            }
        }

        function clearDateFilter() {
            document.getElementById("dateFilter").value = "";
            handleDateSelection();
        }

        function renderTable() {
            const list = document.getElementById("attendanceList");
            const selectedDate = document.getElementById("dateFilter").value;
            document.getElementById("studentCount").innerText = allRecords.length;

            if (!selectedDate) {
                list.innerHTML = '<tr><td colspan="4" class="p-10 sm:p-14 text-center text-slate-500 font-medium"><i class="fa-regular fa-calendar-check text-4xl mb-3 block text-slate-400"></i>请先在上方选择日期以查看签到名单</td></tr>';
                return;
            }

            if (allRecords.length === 0) {
                list.innerHTML = '<tr><td colspan="4" class="p-10 sm:p-14 text-center text-slate-500 font-medium"><i class="fa-regular fa-folder-open text-4xl mb-3 block text-slate-400"></i>该日期暂无签到记录</td></tr>';
                return;
            }

            let htmlContent = "";
            allRecords.forEach(record => {
                htmlContent += `
                    <tr class="hover:bg-white/40 transition duration-150 border-b border-white/20 last:border-0">
                        <td class="p-4 pl-6 sm:pl-8 text-slate-700 font-medium">${record.dateString}</td>
                        <td class="p-4 text-slate-600 font-mono"><span class="bg-white/60 shadow-sm border border-white px-2 py-1 rounded text-xs">${record.timeString}</span></td>
                        <td class="p-4 font-bold text-indigo-700">${record.studentId}</td>
                        <td class="p-4 text-slate-800 font-medium">${record.studentName}</td>
                    </tr>
                `;
            });
            list.innerHTML = htmlContent;
        }

        function openManualModal() {
            const selectedDate = document.getElementById("dateFilter").value;
            if (!selectedDate) {
                alert("⚠️ 请先在日历中选择你要补签的【日期】！");
                return;
            }
            
            currentManualDate = selectedDate;
            document.getElementById('modalDateDisplay').innerText = selectedDate;
            document.getElementById('manualStuId').value = "";
            document.getElementById('manualStuName').value = "";
            
            document.getElementById('manualCheckInModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('manualStuId').focus(), 100);
        }

        function closeManualModal() {
            document.getElementById('manualCheckInModal').classList.add('hidden');
        }

        function submitManualCheckIn() {
            const stuId = document.getElementById('manualStuId').value.trim().toUpperCase();
            const stuName = document.getElementById('manualStuName').value.trim().toUpperCase();
            
            if (!stuId || !stuName) {
                alert("⚠️ STUDENT ID 和 NAME 都不能为空！");
                return;
            }

            const btn = document.getElementById('submitManualBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 提交中...';
            btn.disabled = true;

            db.collection("Attendance")
              .doc(currentManualDate)
              .collection("Students")
              .doc(stuId)
              .set({
                  studentId: stuId,
                  studentName: stuName,
                  timestamp: new Date() 
              })
              .then(() => {
                  alert(`✅ 成功补签！学生 ${stuName} 已加入 ${currentManualDate} 的名单。`);
                  closeManualModal();
                  btn.innerHTML = '<i class="fa-solid fa-check"></i> 确认添加';
                  btn.disabled = false;
              })
              .catch(error => {
                  alert("❌ 补签失败: " + error.message);
                  btn.innerHTML = '<i class="fa-solid fa-check"></i> 确认添加';
                  btn.disabled = false;
              });
        }

        function openReportModal() {
            document.getElementById('reportModal').classList.remove('hidden');
            document.getElementById('reportLoading').classList.remove('hidden');
            document.getElementById('reportEmpty').classList.add('hidden');
            document.getElementById('reportList').classList.add('hidden');
            document.getElementById('downloadReportBtn').disabled = true;

            db.collectionGroup("Students").get().then((snapshot) => {
                let attendanceCount = {}; 

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const id = data.studentId;
                    if (!attendanceCount[id]) {
                        attendanceCount[id] = { id: id, name: data.studentName, count: 0 };
                    }
                    attendanceCount[id].count++;
                });

                globalPassedStudents = Object.values(attendanceCount)
                                             .filter(student => student.count >= 4) // >=4次达标
                                             .sort((a, b) => b.count - a.count);

                document.getElementById('reportLoading').classList.add('hidden');

                if (globalPassedStudents.length === 0) {
                    document.getElementById('reportEmpty').classList.remove('hidden');
                } else {
                    let listHtml = "";
                    globalPassedStudents.forEach(stu => {
                        listHtml += `
                        <li class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center">
                            <div>
                                <div class="font-bold text-slate-800 text-base sm:text-lg">${stu.name}</div>
                                <div class="text-xs sm:text-sm text-slate-500 font-mono">${stu.id}</div>
                            </div>
                            <div class="bg-amber-100 text-amber-700 px-3 py-1 sm:px-4 sm:py-1.5 rounded-lg font-bold text-sm sm:text-base">
                                ${stu.count} 次
                            </div>
                        </li>`;
                    });
                    document.getElementById('reportList').innerHTML = listHtml;
                    document.getElementById('reportList').classList.remove('hidden');
                    document.getElementById('downloadReportBtn').disabled = false; 
                }
            }).catch(error => {
                alert("❌ 统计失败: " + error.message);
                closeReportModal();
            });
        }

        function closeReportModal() {
            document.getElementById('reportModal').classList.add('hidden');
        }

        function exportToExcel() {
            const selectedDate = document.getElementById("dateFilter").value;
            if (!selectedDate) {
                alert("请先选择要导出的日期！"); return;
            }
            if (allRecords.length === 0) {
                alert(`日期 ${selectedDate} 没有可导出的数据！`); return;
            }

            let csvContent = "\uFEFF日期 (Date),时间 (Time),学号 (Student ID),姓名 (Name)\n"; 
            allRecords.forEach(record => {
                csvContent += `"${record.dateString}","${record.timeString}","${record.studentId}","${record.studentName}"\n`;
            });

            triggerDownload(csvContent, `Attendance_${selectedDate}.csv`);
        }

        function exportReportToExcel() {
            let csvContent = "\uFEFF学号 (Student ID),姓名 (Name),总出勤次数 (Total Attendance)\n"; 
            globalPassedStudents.forEach(stu => {
                csvContent += `"${stu.id}","${stu.name}","${stu.count}"\n`;
            });
            triggerDownload(csvContent, `Attendance_Pass_Report.csv`);
        }

        function triggerDownload(content, filename) {
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", filename);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
