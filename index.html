<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CF Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.30); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
        }
        .modal-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .text-glow-dark {
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7), 0 1px 2px rgba(0, 0, 0, 0.9);
        }

        input[type="text"], input[type="number"] { font-size: 16px !important; }
    </style>
    <link rel="preload" as="image" href="Background.webp">
    <link rel="preload" as="image" href="CF_LOGO.webp">
</head>

<body class="min-h-[100dvh] flex items-center justify-center p-3 font-sans text-gray-800 relative bg-cover bg-center bg-no-repeat bg-fixed overflow-y-auto" 
      style="background-image: url('Background.webp');">

    <div class="fixed inset-0 bg-black/30 z-0 pointer-events-none"></div>

    <audio id="tenseAudio" src="bgm.mp3" preload="auto"></audio>

    <div class="glass-card p-5 sm:p-6 rounded-[20px] w-full max-w-[340px] relative z-10 flex flex-col justify-center my-auto shadow-2xl">
        
        <div class="text-center mb-4 mt-1">
            <img src="CF_LOGO.webp" alt="CF Logo" class="w-16 h-16 rounded-full mx-auto mb-2 object-cover border-2 border-white shadow-sm">
            <h1 class="text-lg font-extrabold tracking-tight text-glow-dark mb-1">UTS校园团契我来报到啦~</h1>
            <div id="statusBadge" class="inline-flex items-center gap-1.5 mt-1 px-3 py-1 rounded-full text-xs font-bold bg-white/80 text-gray-700 shadow-sm border border-white">
                <i class="fa-solid fa-circle-notch fa-spin text-[10px]"></i> Connecting...
            </div>
        </div>

        <div id="checkInForm" class="space-y-3 hidden w-full">
            <div id="countdownTimer" class="hidden mb-1 bg-rose-50/90 backdrop-blur-sm border border-rose-100 rounded-xl p-2 flex flex-col items-center justify-center shadow-sm">
                <span class="text-[9px] font-bold text-rose-500 uppercase tracking-widest">Time Remaining</span>
                <div class="text-2xl font-extrabold text-rose-600 font-mono tracking-wider leading-none mt-1" id="timeDisplay">01:00</div>
            </div>

            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-regular fa-id-card text-gray-500 text-sm"></i></div>
                <input type="text" id="studentId" placeholder="STUDENT ID" class="w-full pl-9 pr-3 py-2.5 bg-white/90 border border-white/50 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all outline-none text-gray-800 font-bold placeholder-gray-400 uppercase shadow-sm">
            </div>
            
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-regular fa-user text-gray-500 text-sm"></i></div>
                <input type="text" id="studentName" placeholder="FULL NAME" class="w-full pl-9 pr-3 py-2.5 bg-white/90 border border-white/50 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all outline-none text-gray-800 font-bold placeholder-gray-400 uppercase shadow-sm">
            </div>

            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-key text-indigo-500 text-sm"></i></div>
                <input type="number" id="pinCode" placeholder="4-DIGIT PIN" class="w-full pl-9 pr-3 py-2.5 bg-indigo-50 border border-indigo-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all outline-none text-indigo-900 font-extrabold tracking-widest placeholder-indigo-400 text-center shadow-sm">
            </div>

            <button onclick="submitCheckIn()" id="submitBtn" class="w-full mt-1 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-500/40 transform hover:-translate-y-0.5 transition-all duration-200 active:scale-95 flex justify-center items-center gap-2 border border-indigo-400/50">
                <i class="fa-solid fa-check-circle"></i> Confirm
            </button>
            
            <p class="text-[10px] mt-1 text-center leading-relaxed px-1 font-medium tracking-wide text-glow-dark">
                <i class="fa-solid fa-triangle-exclamation mr-1 text-amber-400"></i>
                Please confirm ID & NAME. Cannot be changed.
            </p>
        </div>

        <div id="successMessage" class="hidden text-center py-4 animate-[fadeIn_0.5s_ease-out]">
            <div class="w-16 h-16 bg-gradient-to-tr from-emerald-400 to-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-3 text-3xl shadow-[0_0_20px_rgba(52,211,153,0.6)] border-2 border-white/50">
                <i class="fa-solid fa-check"></i>
            </div>
            <h2 class="text-xl font-extrabold mb-1 text-glow-dark">Attendance Submitted</h2>
            <p id="successDesc" class="text-xs mt-1 font-medium text-glow-dark opacity-90">You can now close this page.</p>
        </div>
    </div>

    <div id="customDialog" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden transform scale-95 transition-transform duration-300" id="customDialogBox">
            <div class="p-6 text-center">
                <div id="dialogIcon" class="mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-3xl"></div>
                <h3 id="dialogTitle" class="text-xl font-bold text-slate-800 mb-2"></h3>
                <p id="dialogMessage" class="text-slate-500 text-sm mb-6 whitespace-pre-line"></p>
                <div class="flex gap-3 justify-center" id="dialogButtons"></div>
            </div>
        </div>
    </div>
     
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script>
        const dialogOverlay = document.getElementById('customDialog');
        const dialogBox = document.getElementById('customDialogBox');

        function customAlert(msg, type='info', title='系统提示') {
            const iconDiv = document.getElementById('dialogIcon');
            const titleDiv = document.getElementById('dialogTitle');
            const msgDiv = document.getElementById('dialogMessage');
            const btnDiv = document.getElementById('dialogButtons');

            titleDiv.innerText = title;
            msgDiv.innerText = msg;

            if(type === 'success') {
                iconDiv.className = "mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-3xl bg-green-100 text-green-500";
                iconDiv.innerHTML = '<i class="fa-solid fa-check"></i>';
            } else if(type === 'warning') {
                iconDiv.className = "mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-3xl bg-amber-100 text-amber-500";
                iconDiv.innerHTML = '<i class="fa-solid fa-exclamation"></i>';
            } else if(type === 'error') {
                iconDiv.className = "mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-3xl bg-rose-100 text-rose-500";
                iconDiv.innerHTML = '<i class="fa-solid fa-xmark"></i>';
            } else {
                iconDiv.className = "mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-3xl bg-indigo-100 text-indigo-500";
                iconDiv.innerHTML = '<i class="fa-solid fa-info"></i>';
            }

            btnDiv.innerHTML = '';
            const okBtn = document.createElement('button');
            okBtn.className = "w-full py-2.5 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition-colors shadow-md active:scale-95";
            okBtn.innerText = "我知道了";
            okBtn.onclick = () => {
                dialogOverlay.classList.add('opacity-0');
                dialogBox.classList.add('scale-95');
                setTimeout(() => { dialogOverlay.classList.add('hidden'); }, 300);
            };
            btnDiv.appendChild(okBtn);

            dialogOverlay.classList.remove('hidden');
            setTimeout(() => {
                dialogOverlay.classList.remove('opacity-0');
                dialogBox.classList.remove('scale-95');
            }, 10);
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBowy5HiYuzmuQnVoiPhM7hvDsAaMSK3a8",
            authDomain: "attendance-a7ac5.firebaseapp.com",
            projectId: "attendance-a7ac5",
            storageBucket: "attendance-a7ac5.firebasestorage.app",
            messagingSenderId: "179755027767",
            appId: "1:179755027767:web:37c6a12e95c8ea0a5b9eb2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const todayStr = new Date().toISOString().split('T')[0]; 
        const deviceLockKey = "checkedInTime_" + todayStr;
        let timerInterval = null;
        let hasAlertedCheat = false; 
        let hasPlayedAudio = false;

        function isDeviceLocked() {
            const savedTime = localStorage.getItem(deviceLockKey);
            if (!savedTime) return false; 
            const currentTime = new Date().getTime();
            const timeDifference = currentTime - parseInt(savedTime);
            if (timeDifference < 300000) { 
                return true; 
            } else {
                localStorage.removeItem(deviceLockKey);
                return false;
            }
        }

        window.onload = function() {
            const searchString = window.location.search.substring(1); 
            const mainParam = searchString.split('&')[0]; 
            const authCode = mainParam.split('=')[1]; 

            if (!authCode || authCode.length !== 6) {
                if (timerInterval) clearInterval(timerInterval);
                document.getElementById('checkInForm').classList.add('hidden');
                
                const badge = document.getElementById('statusBadge');
                badge.className = "inline-flex items-center gap-2 mt-3 px-4 py-1.5 rounded-full text-sm font-bold bg-red-100 text-red-600 shadow-sm border border-red-200";
                badge.innerHTML = '<i class="fa-solid fa-ban text-xs"></i> 无法访问 (Invalid Access)';
                badge.classList.remove('hidden');
                
                if (!hasAlertedCheat) {
                    customAlert("Please scan the QR Code for Attendance", "error", "⚠️ Invalid Access");
                    hasAlertedCheat = true;
                }
                return; 
            }

            db.collection("Sessions").doc("Class_01").onSnapshot((doc) => {
                const badge = document.getElementById('statusBadge');
                const form = document.getElementById('checkInForm');
                const successMsg = document.getElementById('successMessage');
                const timerContainer = document.getElementById('countdownTimer');
                const timeDisplay = document.getElementById('timeDisplay');
                const audioPlayer = document.getElementById("tenseAudio");
                const submitBtn = document.getElementById('submitBtn');

                if (timerInterval) clearInterval(timerInterval);

                if (isDeviceLocked()) {
                    badge.classList.add('hidden');
                    form.classList.add('hidden');
                    if (timerContainer) timerContainer.classList.add('hidden');
                    successMsg.classList.remove('hidden');
                    document.getElementById('successDesc').innerText = "You have recently checked in. Please wait 5 minutes.";
                    return; 
                }

                if (doc.exists && doc.data().status === "Open") {
                    const endTime = doc.data().endTime; 

                    if (endTime - new Date().getTime() > 10000) {
                        hasPlayedAudio = false;
                    }

                    if (!hasPlayedAudio && audioPlayer) {
                        audioPlayer.currentTime = 0;
                        audioPlayer.volume = 0.5; 
                        audioPlayer.play().catch(e => console.log("浏览器安全拦截"));
                        hasPlayedAudio = true;
                    }

                    timerInterval = setInterval(() => {
                        const now = new Date().getTime();
                        const distance = endTime - now;

                        if (distance <= 0) {
                            clearInterval(timerInterval);
                            timeDisplay.innerText = "00:00";
                            form.classList.add('opacity-50', 'pointer-events-none');
                            
                            if (audioPlayer) {
                                audioPlayer.pause();
                                audioPlayer.currentTime = 0;
                            }
                        } else {
                            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                            timeDisplay.innerText = (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
                        }
                    }, 1000);

                    badge.innerHTML = '<i class="fa-solid fa-lock-open text-xs"></i> Attendance Open';
                    badge.className = "inline-flex items-center gap-1.5 mt-1 px-3 py-1 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700 shadow-sm border border-emerald-200";
                    
                    form.classList.remove('hidden', 'opacity-50', 'pointer-events-none');
                    if (timerContainer) timerContainer.classList.remove('hidden');
                    successMsg.classList.add('hidden');
                    
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Confirm';
                    submitBtn.className = "w-full mt-1 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-500/40 transform hover:-translate-y-0.5 transition-all duration-200 active:scale-95 flex justify-center items-center gap-2 border border-indigo-400/50";

                } else {
                    badge.innerHTML = '<i class="fa-solid fa-hourglass-half text-xs"></i> Waiting for access...';
                    badge.className = "inline-flex items-center gap-1.5 mt-1 px-3 py-1 rounded-full text-xs font-bold bg-amber-100 text-amber-600 shadow-sm border border-amber-200";
                    
                    badge.classList.remove('hidden');
                    form.classList.add('hidden'); 
                    
                    if (timerContainer) timerContainer.classList.add('hidden'); 
                    successMsg.classList.add('hidden'); 

                    if (audioPlayer) {
                        audioPlayer.pause();
                        audioPlayer.currentTime = 0;
                    }
                }
            });
        };

        function submitCheckIn() {
            if (isDeviceLocked()) {
                customAlert("您刚刚已经成功签到过了，请耐心等待 5 分钟后再试。", "warning", "操作太频繁");
                return;
            }

            const studentId = document.getElementById('studentId').value.trim().toUpperCase();
            const studentName = document.getElementById('studentName').value.trim().toUpperCase();
            const enteredPin = document.getElementById('pinCode').value.trim();

            if (!studentId || !studentName || !enteredPin) {
                customAlert("请完整填写 Student ID, Name 以及屏幕上的 PIN 码！", "warning", "信息不完整"); 
                return;
            }

            // 🌟 重点防呆验证
            if (studentId.includes('@')) {
                customAlert("Student ID 不能是 Email 格式！", "warning", "格式错误");
                return;
            }
            if (/\d/.test(studentName)) {
                customAlert("Student Name 不能包含数字！", "warning", "格式错误");
                return;
            }
            if (studentName.includes('@') || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(studentName)) {
                customAlert("Student Name 不能是 Email 格式！", "warning", "格式错误");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';
            btn.disabled = true;

            db.collection("Sessions").doc("Class_01").get().then((doc) => {
                if (doc.exists && doc.data().status === "Open") {
                    
                    const correctPin = doc.data().currentPin;
                    if (enteredPin !== correctPin) {
                        customAlert("PIN 码不正确！请查看前方大屏幕获取最新的 4 位数密码。", "error", "验证失败");
                        btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Confirm'; 
                        btn.className = "w-full mt-1 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-500/40 transform hover:-translate-y-0.5 transition-all duration-200 active:scale-95 flex justify-center items-center gap-2 border border-indigo-400/50";
                        btn.disabled = false;
                        return; 
                    }

                    const today = new Date();
                    const dateFolderName = today.toISOString().split('T')[0]; 

                    db.collection("Attendance")
                    .doc(dateFolderName)
                    .collection("Students")
                    .doc(studentId) 
                    .set({
                        studentId: studentId, 
                        studentName: studentName,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp() 
                    })
                    .then(() => {
                        const currentTime = new Date().getTime();
                        localStorage.setItem(deviceLockKey, currentTime.toString());

                        document.getElementById('checkInForm').classList.add('hidden');
                        document.getElementById('statusBadge').classList.add('hidden');
                        document.getElementById('successMessage').classList.remove('hidden');
                        document.getElementById('successDesc').innerText = "Attendance Submitted Successfully!";
                    })
                    .catch((error) => {
                        customAlert("提交失败: " + error.message, "error", "网络异常");
                        btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Confirm'; 
                        btn.disabled = false;
                    });

                } else {
                    customAlert("已关闭,无法提交。", "warning", "签到结束");
                    btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Confirm'; 
                    btn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
