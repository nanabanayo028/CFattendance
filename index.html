<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生签到系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">课程签到</h1>
            <p id="statusText" class="text-sm text-green-600 mt-1 font-semibold">🟢 签到通道已开启</p>
        </div>

        <div id="checkInForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">学号 (Student ID)</label>
                <input type="text" id="studentId" placeholder="例如: BCS23090066" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">姓名 (Name)</label>
                <input type="text" id="studentName" placeholder="你的全名" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <button onclick="submitCheckIn()" 
                    class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-200">
                确认到场
            </button>
        </div>

        <div id="successMessage" class="hidden text-center py-4">
            <div class="text-5xl mb-2">✅</div>
            <h2 class="text-xl font-bold text-gray-800">签到成功！</h2>
            <p class="text-gray-500 text-sm mt-2">你可以关闭此页面了。</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
       // 1. 你的 Firebase 钥匙
        const firebaseConfig = {
          apiKey: "AIzaSyBowy5HiYuzmuQnVoiPhM7hvDsAaMSK3a8",
          authDomain: "attendance-a7ac5.firebaseapp.com",
          projectId: "attendance-a7ac5",
          storageBucket: "attendance-a7ac5.firebasestorage.app",
          messagingSenderId: "179755027767",
          appId: "1:179755027767:web:37c6a12e95c8ea0a5b9eb2"
        };

        // 2. 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ==========================================
        // 🌟 新增：实时监听老师的开关状态
        // ==========================================
        db.collection("Sessions").doc("Class_01").onSnapshot((doc) => {
            const statusText = document.getElementById('statusText');
            const checkInForm = document.getElementById('checkInForm');

            // 检查数据库里的状态是不是 Open
            if (doc.exists && doc.data().status === "Open") {
                // 状态开启：显示绿字，显示输入框
                statusText.innerText = "🟢 签到通道已开启";
                statusText.className = "text-sm text-green-600 mt-1 font-semibold";
                checkInForm.style.display = "block"; 
            } else {
                // 状态关闭：显示红字，隐藏输入框！(防代签核心)
                statusText.innerText = "🔴 签到通道未开启或已关闭";
                statusText.className = "text-sm text-red-600 mt-1 font-semibold";
                checkInForm.style.display = "none"; 
            }
        });

        // 3. 提交数据的动作
        function submitCheckIn() {
            // 加入了 .trim().toUpperCase() 自动转大写并去除头尾空格
            const studentId = document.getElementById('studentId').value.trim().toUpperCase();
            const studentName = document.getElementById('studentName').value.trim().toUpperCase();

            if (studentId === "" || studentName === "") {
                alert("请填写完整的学号和姓名！");
                return;
            }

            const btn = document.querySelector('button');
            btn.innerText = "提交中...";
            btn.disabled = true;

            // 双重保险：提交前再次确认老师没有在这一秒钟关掉通道
            db.collection("Sessions").doc("Class_01").get().then((doc) => {
                if (doc.exists && doc.data().status === "Open") {
                    // 状态正常，写入数据
                    db.collection("Attendance").add({
                        studentId: studentId,
                        studentName: studentName,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp() 
                    }).then(() => {
                        document.getElementById('checkInForm').classList.add('hidden');
                        document.getElementById('statusText').classList.add('hidden');
                        document.getElementById('successMessage').classList.remove('hidden');
                    }).catch((error) => {
                        alert("发生错误: " + error.message);
                        btn.innerText = "确认到场"; 
                        btn.disabled = false;
                    });
                } else {
                    // 老师已经关了，拦截作弊
                    alert("手慢了！签到通道刚刚已关闭。");
                    btn.innerText = "确认到场"; 
                    btn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
