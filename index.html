<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CF Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 🌟 调整透明度后的高级毛玻璃特效 */
        .glass-card {
            /* 0.45 是透明度 (越接近 0 越透明，越接近 1 越白) */
            background: rgba(255, 255, 255, 0.30); 
            /* 稍微降低了一点模糊度，让后面的合照轮廓更清晰 */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
        }
    </style>
    <link rel="preload" as="image" href="251026-4.jpg">
    <link rel="preload" as="image" href="CF_LOGO.png">
</head>

<body class="min-h-screen flex items-center justify-center p-4 font-sans text-gray-800 relative bg-cover bg-center bg-no-repeat bg-fixed" 
      style="background-image: url('Background.webp');">

    <div class="absolute inset-0 bg-black/30 z-0 pointer-events-none"></div>

    <div class="glass-card p-7 sm:p-8 rounded-3xl w-full max-w-[360px] relative z-10 overflow-hidden">
        
        <div class="text-center mb-6 mt-2">
            <img src="CF_LOGO.webp" alt="CF Logo" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-4 border-white shadow-md">
            
            <h1 class="text-2xl font-extrabold tracking-tight text-gray-900">UTS校园团契 我来报到啦~</h1>
            
            <div id="statusBadge" class="inline-flex items-center gap-2 mt-3 px-3 py-1 rounded-full text-sm font-medium bg-gray-100 text-gray-500 transition-colors duration-300 shadow-sm border border-white/50">
                <i class="fa-solid fa-circle-notch fa-spin text-xs"></i> Connecting...
            </div>
        </div>

        <div id="checkInForm" class="space-y-4 hidden">
            
            <div id="countdownTimer" class="hidden mb-2 bg-rose-50 border border-rose-100 rounded-xl p-3 flex flex-col items-center justify-center animate-[pulse_2s_ease-in-out_infinite] shadow-inner">
                <span class="text-[10px] font-bold text-rose-400 uppercase tracking-widest mb-1">
                    Time Remaining
                </span>
                <div class="text-3xl font-extrabold text-rose-600 font-mono tracking-wider" id="timeDisplay">02:00</div>
            </div>

            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-regular fa-id-card text-gray-400"></i>
                </div>
                <input type="text" id="studentId" placeholder="STUDENT ID AS OCULUS" 
                       class="w-full pl-11 pr-4 py-3.5 bg-white/80 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:border-indigo-500 transition-all outline-none text-gray-700 font-medium placeholder-gray-400 uppercase shadow-sm">
            </div>
            
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-regular fa-user text-gray-400"></i>
                </div>
                <input type="text" id="studentName" placeholder="FULL NAME AS OCULUS" 
                       class="w-full pl-11 pr-4 py-3.5 bg-white/80 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:border-indigo-500 transition-all outline-none text-gray-700 font-medium placeholder-gray-400 uppercase shadow-sm">
            </div>

            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-solid fa-key text-indigo-400"></i>
                </div>
                <input type="text" id="pinCode" placeholder="4-DIGIT PIN" 
                       class="w-full pl-11 pr-4 py-3.5 bg-indigo-50 border border-indigo-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:border-indigo-500 transition-all outline-none text-indigo-900 font-extrabold tracking-widest placeholder-indigo-400 text-center shadow-sm">
            </div>

            <button onclick="submitCheckIn()" id="submitBtn"
                    class="w-full mt-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-200 transform hover:-translate-y-0.5 transition-all duration-200 active:scale-95 flex justify-center items-center gap-2">
                <i class="fa-solid fa-check-circle"></i> Confirm
            </button>
            <p class="text-[10px] text-black mt-4 text-center leading-relaxed px-1 font-medium">
                <i class="fa-solid fa-triangle-exclamation mr-1"></i>
                Please confirm your STUDENT ID and NAME is corrected. Once submitted, it cannot be changed.
            </p>
        </div>

        <div id="successMessage" class="hidden text-center py-6 animate-[fadeIn_0.5s_ease-out]">
            <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl shadow-sm">
                <i class="fa-solid fa-check"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Attendance Submitted</h2>
            <p id="successDesc" class="text-gray-500 text-sm mt-2">You can now close this page.</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBowy5HiYuzmuQnVoiPhM7hvDsAaMSK3a8",
            authDomain: "attendance-a7ac5.firebaseapp.com",
            projectId: "attendance-a7ac5",
            storageBucket: "attendance-a7ac5.firebasestorage.app",
            messagingSenderId: "179755027767",
            appId: "1:179755027767:web:37c6a12e95c8ea0a5b9eb2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const todayStr = new Date().toISOString().split('T')[0]; 
        const deviceLockKey = "checkedInTime_" + todayStr;
        let timerInterval = null;

        function isDeviceLocked() {
            const savedTime = localStorage.getItem(deviceLockKey);
            if (!savedTime) return false; 
            const currentTime = new Date().getTime();
            const timeDifference = currentTime - parseInt(savedTime);
            if (timeDifference < 300000) {
                return true; 
            } else {
                localStorage.removeItem(deviceLockKey);
                return false;
            }
        }

        // 3. 实时监听通道状态 (核心逻辑)
        db.collection("Sessions").doc("Class_01").onSnapshot((doc) => {
            const badge = document.getElementById('statusBadge');
            const form = document.getElementById('checkInForm');
            const successMsg = document.getElementById('successMessage');
            const timerContainer = document.getElementById('countdownTimer');
            const timeDisplay = document.getElementById('timeDisplay');

            if (timerInterval) clearInterval(timerInterval);

            // 优先判断：如果通道是开启的
            if (doc.exists && doc.data().status === "Open") {
                
                // 次要判断：如果学生刚刚交过卷了，只给他看成功页面
                if (isDeviceLocked()) {
                    badge.classList.add('hidden');
                    form.classList.add('hidden');
                    if (timerContainer) timerContainer.classList.add('hidden');
                    successMsg.classList.remove('hidden');
                    document.getElementById('successDesc').innerText = "You have recently checked in. Please wait 5 minutes.";
                    return; 
                }

                // 如果没交过卷：启动倒计时和表单
                const endTime = doc.data().endTime; 

                timerInterval = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = endTime - now;

                    if (distance <= 0) {
                        clearInterval(timerInterval);
                        timeDisplay.innerText = "00:00";
                        form.classList.add('opacity-50', 'pointer-events-none');
                    } else {
                        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                        timeDisplay.innerText = (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
                    }
                }, 1000);

                badge.innerHTML = '<i class="fa-solid fa-lock-open text-xs"></i> Attendance Open';
                badge.className = "inline-flex items-center gap-2 mt-3 px-4 py-1.5 rounded-full text-sm font-bold bg-green-100 text-green-700 shadow-sm border border-green-200";
                
                badge.classList.remove('hidden');
                form.classList.remove('hidden', 'opacity-50', 'pointer-events-none');
                if (timerContainer) timerContainer.classList.remove('hidden');
                successMsg.classList.add('hidden');

            } else {
                // 如果通道关闭：所有人强行显示 Closed
                badge.innerHTML = '<i class="fa-solid fa-lock text-xs"></i> Attendance Closed';
                badge.className = "inline-flex items-center gap-2 mt-3 px-4 py-1.5 rounded-full text-sm font-bold bg-red-100 text-red-600 shadow-sm border border-red-200";
                
                badge.classList.remove('hidden'); 
                form.classList.add('hidden');     
                if (timerContainer) timerContainer.classList.add('hidden'); 
                successMsg.classList.add('hidden'); 
            }
        });

        // 4. 提交签到数据
        function submitCheckIn() {
            if (isDeviceLocked()) {
                alert("You have recently checked in. Please wait 5 minutes.");
                return;
            }

            const studentId = document.getElementById('studentId').value.trim().toUpperCase();
            const studentName = document.getElementById('studentName').value.trim().toUpperCase();
            const enteredPin = document.getElementById('pinCode').value.trim();

            if (!studentId || !studentName || !enteredPin) {
                alert("Please fill in Student ID, Name, and the PIN code!"); 
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';
            btn.disabled = true;

            db.collection("Sessions").doc("Class_01").get().then((doc) => {
                if (doc.exists && doc.data().status === "Open") {
                    
                    // 核对密码
                    const correctPin = doc.data().currentPin;
                    if (enteredPin !== correctPin) {
                        alert("❌ The PIN code is incorrect! Please check the screen.");
                        btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Confirm'; 
                        btn.disabled = false;
                        return; 
                    }

                    // 密码正确，用学号做文件名存入数据库
                    const today = new Date();
                    const dateFolderName = today.toISOString().split('T')[0]; 

                    db.collection("Attendance")
                    .doc(dateFolderName)
                    .collection("Students")
                    .doc(studentId) 
                    .set({
                        studentId: studentId, 
                        studentName: studentName,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp() 
                    })
                    .then(() => {
                        // 签到成功，上锁 5 分钟
                        const currentTime = new Date().getTime();
                        localStorage.setItem(deviceLockKey, currentTime.toString());

                        document.getElementById('checkInForm').classList.add('hidden');
                        document.getElementById('statusBadge').classList.add('hidden');
                        document.getElementById('successMessage').classList.remove('hidden');
                        document.getElementById('successDesc').innerText = "Attendance Submitted Successfully!";
                    })
                    .catch((error) => {
                        alert("Error: " + error.message);
                        btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Confirm'; 
                        btn.disabled = false;
                    });

                } else {
                    alert("Attendance is now closed.");
                    btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Confirm'; 
                    btn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
