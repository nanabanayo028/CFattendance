<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生签到系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 自定义一点点毛玻璃效果 */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-100 min-h-screen flex items-center justify-center p-4 font-sans text-gray-800">

    <div class="glass-card p-8 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] max-w-sm w-full relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-600"></div>

        <div class="text-center mb-8 mt-2">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl shadow-sm">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight text-gray-900">CF Attendance System</h1>
            
            <div id="statusBadge" class="inline-flex items-center gap-2 mt-3 px-3 py-1 rounded-full text-sm font-medium bg-gray-100 text-gray-500 transition-colors duration-300">
                <i class="fa-solid fa-circle-notch fa-spin text-xs"></i> Connecting...
            </div>
        </div>

        <div id="checkInForm" class="space-y-5 hidden">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-regular fa-id-card text-gray-400"></i>
                </div>
                <input type="text" id="studentId" placeholder="STUDENT ID SAME AS OCULUS" 
                       class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:border-indigo-500 transition-all outline-none text-gray-700 font-medium placeholder-gray-400">
            </div>
            
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-regular fa-user text-gray-400"></i>
                </div>
                <input type="text" id="studentName" placeholder="FULL NAME SAME AS OCULUS" 
                       class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:border-indigo-500 transition-all outline-none text-gray-700 font-medium placeholder-gray-400">
            </div>

            <button onclick="submitCheckIn()" id="submitBtn"
                    class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-200 transform hover:-translate-y-0.5 transition-all duration-200 active:scale-95 flex justify-center items-center gap-2">
                <i class="fa-solid fa-check-circle"></i> Confirm
            </button>
            <p class="text-[10px] text-amber-600 mt-4 text-center leading-relaxed px-2 font-medium">
                <i class="fa-solid fa-triangle-exclamation mr-1"></i>
                Please confirm your Name and ID is correct before you submit. 
                Once submitted, you cannot change it.
            </p>
        </div>

        <div id="successMessage" class="hidden text-center py-6 animate-[fadeIn_0.5s_ease-out]">
            <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl shadow-sm">
                <i class="fa-solid fa-check"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Attendance Submitted</h2>
            <!-- <p class="text-gray-500 text-sm">信息已安全记录，你可以关闭此页面。</p> -->
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        // Your web app's Firebase configuration
        const firebaseConfig = {
        apiKey: "AIzaSyBowy5HiYuzmuQnVoiPhM7hvDsAaMSK3a8",
        authDomain: "attendance-a7ac5.firebaseapp.com",
        projectId: "attendance-a7ac5",
        storageBucket: "attendance-a7ac5.firebasestorage.app",
        messagingSenderId: "179755027767",
        appId: "1:179755027767:web:37c6a12e95c8ea0a5b9eb2"
        };

        // 1. 初始化 Firebase (保持你的配置不变)
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 🌟 新增：检查这台设备是否已经签到过
        // 获取当前课程的唯一标记（比如按日期，防止明天不能签到）
        const todayStr = new Date().toISOString().split('T')[0]; 
        const deviceLockKey = "checkedIn_" + todayStr;

        // 监听状态改变
        db.collection("Sessions").doc("Class_01").onSnapshot((doc) => {
            const badge = document.getElementById('statusBadge');
            const form = document.getElementById('checkInForm');
            const successMsg = document.getElementById('successMessage');

            // 首先检查本地标记，如果今天签到过了，直接显示成功画面
            if (localStorage.getItem(deviceLockKey)) {
                badge.classList.add('hidden');
                form.classList.add('hidden');
                successMsg.classList.remove('hidden');
                successMsg.querySelector('p').innerText = "You have already checked in for today.";
                return;
            }

            if (doc.exists && doc.data().status === "Open") {
                badge.innerHTML = '<i class="fa-solid fa-lock-open text-xs"></i> Attendance Open';
                badge.className = "inline-flex items-center gap-2 mt-3 px-4 py-1.5 rounded-full text-sm font-bold bg-green-100 text-green-700 shadow-sm";
                form.classList.remove('hidden');
            } else {
                badge.innerHTML = '<i class="fa-solid fa-lock text-xs"></i> Attendance Closed';
                badge.className = "inline-flex items-center gap-2 mt-3 px-4 py-1.5 rounded-full text-sm font-bold bg-red-100 text-red-600 shadow-sm";
                form.classList.add('hidden');
            }
        });

        function submitCheckIn() {
            // 再次检查防止绕过前端隐藏
            if (localStorage.getItem(deviceLockKey)) {
                alert("You have already checked in today!");
                return;
            }

            const studentId = document.getElementById('studentId').value.trim().toUpperCase();
            const studentName = document.getElementById('studentName').value.trim().toUpperCase();

            if (!studentId || !studentName) {
                alert("Please fill in both Student ID and Name!"); return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';
            btn.disabled = true;

            db.collection("Sessions").doc("Class_01").get().then((doc) => {
                if (doc.exists && doc.data().status === "Open") {
                    db.collection("Attendance").add({
                        studentId: studentId, studentName: studentName,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp() 
                    }).then(() => {
                        // 🌟 核心：签到成功后，在本地留下“足迹”
                        localStorage.setItem(deviceLockKey, "true");

                        document.getElementById('checkInForm').classList.add('hidden');
                        document.getElementById('statusBadge').classList.add('hidden');
                        document.getElementById('successMessage').classList.remove('hidden');
                    }).catch((error) => {
                        alert("Error: " + error.message);
                        btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Confirm'; 
                        btn.disabled = false;
                    });
                } else {
                    alert("Attendance is now closed.");
                    btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Confirm'; 
                    btn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
